name: Auto Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy server files
        run: |
          cp server/*.py ~/study-tracker/
          cp server/routers/*.py ~/study-tracker/routers/
          cp server/static/*.html ~/study-tracker/static/

      - name: Clear pycache and restart service
        run: |
          find ~/study-tracker -name "__pycache__" -not -path "*/venv/*" -exec rm -rf {} + 2>/dev/null || true
          sudo systemctl restart study-tracker
          sleep 2
          systemctl is-active study-tracker

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --pretty=%s)
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🛠️ 서버가 새롭게 업데이트됐어요!\n> ${COMMIT_MSG}\n잘 부탁드려요 🙏\",\"username\":\"Study-Deploy\",\"icon_emoji\":\":sparkles:\"}"
