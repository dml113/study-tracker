name: Sync Client After Build

on:
  workflow_run:
    workflows: ["Build & Deploy Client"]
    types: [completed]
    branches: [main]

jobs:
  sync:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Sync client from GitHub Release
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/auth/login \
            -d "username=admin&password=${ADMIN_PASSWORD}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          RESULT=$(curl -s -X POST http://localhost:8000/admin/client/sync-github \
            -H "Authorization: Bearer ${TOKEN}")
          echo "${RESULT}"

      - name: Notify Slack
        run: |
          VERSION=$(cat ~/study-tracker/client_dist/version.txt 2>/dev/null || echo "unknown")
          curl -s -X POST "https://hooks.slack.com/services/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" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🎉 클라이언트 v${VERSION} 업데이트가 준비됐어요!\n앱을 다시 실행하면 자동으로 업데이트돼요 😊\",\"username\":\"Study-Deploy\",\"icon_emoji\":\":sparkles:\"}"
