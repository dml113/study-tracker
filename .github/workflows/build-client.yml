name: Build & Deploy Client

on:
  push:
    branches: [main]
    paths:
      - 'client/VERSION'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller pynput requests plyer Pillow pywin32

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(cat client/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Set version in client.py
        shell: bash
        run: sed -i "s/^VERSION = .*/VERSION = \"${{ steps.ver.outputs.version }}\"/" client/client.py

      - name: Build EXE
        shell: pwsh
        run: |
          cd client
          pyinstaller --onedir --windowed --name StudyTracker `
            --hidden-import=pynput.keyboard._win32 `
            --hidden-import=pynput.mouse._win32 `
            --hidden-import=win32gui `
            --hidden-import=win32process `
            --hidden-import=PIL `
            --hidden-import=PIL.ImageGrab `
            client.py
          Compress-Archive -Path dist/StudyTracker/* -DestinationPath dist/StudyTracker.zip

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release delete "v${VERSION}" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            --repo ${{ github.repository }} \
            --title "Client v${VERSION}" \
            --notes "자동 빌드 ($(date '+%Y-%m-%d %H:%M'))" \
            client/dist/StudyTracker.zip
