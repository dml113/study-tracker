<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fdf6f0; --surface:#fff; --primary:#ff8fab; --primary-dark:#e8738f;
  --text:#3d2b56; --text-light:#7b6b8d; --muted:#c4b5d5;
  --border:rgba(200,180,220,0.3); --shadow:0 4px 20px rgba(180,120,200,0.1);
  --mint:#6bcb77; --red:#ff6b6b; --amber:#ffb347;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(200,180,220,0.15) 1px,transparent 1px); background-size:22px 22px; z-index:0; }
.blob { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; animation:blobFloat 18s ease-in-out infinite; }
.blob-1 { width:500px; height:500px; background:rgba(255,143,171,0.1); top:-200px; left:-150px; }
.blob-2 { width:400px; height:400px; background:rgba(168,216,234,0.09); bottom:-150px; right:-120px; animation-delay:-9s; }
@keyframes blobFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-15px)} }

.header { position:relative; z-index:10; background:rgba(255,255,255,0.9); backdrop-filter:blur(20px); border-bottom:1.5px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:1.15rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-right { display:flex; align-items:center; gap:10px; }
#adminName { font-size:0.82rem; font-weight:700; color:var(--text-light); }
.badge { font-size:0.7rem; font-weight:800; padding:3px 12px; border-radius:99px; letter-spacing:0.5px; }
.badge-superadmin { background:rgba(255,107,107,0.12); border:1.5px solid rgba(255,107,107,0.3); color:var(--red); }
.badge-group_admin { background:rgba(199,125,255,0.12); border:1.5px solid rgba(199,125,255,0.3); color:#a855f7; }
.logout-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--text-light); padding:7px 16px; border-radius:99px; cursor:pointer; font-size:0.82rem; font-family:'Nunito',sans-serif; font-weight:700; transition:all 0.2s; }
.logout-btn:hover { border-color:var(--primary); color:var(--primary); }
.container { position:relative; z-index:1; max-width:1100px; margin:24px auto; padding:0 20px; }

.tabs { display:flex; gap:5px; margin-bottom:24px; flex-wrap:wrap; }
.tab { padding:8px 16px; border-radius:99px; cursor:pointer; font-size:0.82rem; font-weight:700; font-family:'Nunito',sans-serif; color:var(--text-light); border:1.5px solid var(--border); background:var(--surface); transition:all 0.2s; }
.tab:hover { border-color:var(--primary); color:var(--primary); }
.tab.active { background:linear-gradient(135deg,var(--primary),#c77dff); border-color:transparent; color:white; box-shadow:0 2px 10px rgba(255,143,171,0.35); }

.create-form { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:20px 22px; margin-bottom:22px; display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; box-shadow:var(--shadow); }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:0.72rem; font-weight:800; color:var(--text-light); letter-spacing:0.5px; text-transform:uppercase; }
.form-group input, .form-group select { background:#faf7fd; border:1.5px solid var(--border); border-radius:12px; color:var(--text); padding:9px 13px; font-family:'Nunito',sans-serif; font-size:0.9rem; font-weight:600; outline:none; min-width:140px; transition:border-color 0.2s; }
.form-group input:focus, .form-group select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(255,143,171,0.12); }
.form-group select option { background:#fff; }

.btn { padding:9px 20px; border-radius:12px; border:none; cursor:pointer; font-size:0.88rem; font-weight:800; font-family:'Nunito',sans-serif; transition:all 0.2s; }
.btn-primary { background:linear-gradient(135deg,var(--primary),#c77dff); color:white; box-shadow:0 3px 12px rgba(255,143,171,0.3); }
.btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.btn-sm { padding:5px 12px; font-size:0.78rem; font-weight:800; border:none; border-radius:8px; cursor:pointer; font-family:'Nunito',sans-serif; }
.btn-danger { background:rgba(255,107,107,0.1); border:1.5px solid rgba(255,107,107,0.25); color:var(--red); }
.btn-danger:hover { background:rgba(255,107,107,0.2); }
.btn-warning { background:rgba(255,179,71,0.1); border:1.5px solid rgba(255,179,71,0.25); color:var(--amber); }
.btn-warning:hover { background:rgba(255,179,71,0.2); }

table { width:100%; border-collapse:collapse; background:var(--surface); border-radius:16px; overflow:hidden; border:1.5px solid var(--border); box-shadow:var(--shadow); }
th { background:rgba(200,180,220,0.1); color:var(--text-light); font-size:0.72rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; padding:12px 16px; text-align:left; border-bottom:1.5px solid var(--border); }
td { padding:12px 16px; border-top:1px solid rgba(200,180,220,0.12); font-size:0.9rem; vertical-align:middle; }
tr:hover td { background:rgba(255,143,171,0.03); }

.status-dot { width:7px; height:7px; border-radius:50%; display:inline-block; margin-right:6px; }
.dot-active { background:var(--mint); box-shadow:0 0 6px rgba(107,203,119,0.5); }
.dot-inactive { background:var(--muted); }
.role-badge { font-size:0.7rem; font-weight:800; padding:2px 10px; border-radius:99px; }
.role-superadmin { background:rgba(255,107,107,0.1); border:1.5px solid rgba(255,107,107,0.2); color:var(--red); }
.role-group_admin { background:rgba(199,125,255,0.1); border:1.5px solid rgba(199,125,255,0.2); color:#a855f7; }
.role-member { background:rgba(200,180,220,0.12); border:1.5px solid rgba(200,180,220,0.25); color:var(--text-light); }
.group-badge { font-size:0.7rem; font-weight:800; padding:2px 10px; border-radius:99px; background:rgba(255,143,171,0.1); border:1.5px solid rgba(255,143,171,0.25); color:var(--primary); }
.td-actions { display:flex; gap:5px; flex-wrap:wrap; }
.time-bar-wrap { background:rgba(200,180,220,0.15); border-radius:99px; height:5px; width:70px; display:inline-block; vertical-align:middle; margin-left:8px; overflow:hidden; }
.time-bar { height:100%; background:linear-gradient(90deg,var(--primary),#c77dff); border-radius:99px; }

.date-bar { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.date-bar input { background:#faf7fd; border:1.5px solid var(--border); border-radius:12px; color:var(--text); padding:8px 13px; font-size:0.88rem; font-family:'Nunito',sans-serif; font-weight:600; outline:none; }
.date-bar input:focus { border-color:var(--primary); }

.att-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 20px; margin-bottom:10px; transition:border-color 0.2s, transform 0.2s; box-shadow:var(--shadow); }
.att-card:hover { border-color:rgba(255,143,171,0.3); transform:translateY(-1px); }
.att-header { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
.att-name { font-weight:800; font-size:1rem; flex:1; }
.att-times { display:flex; gap:20px; }
.att-time-item { font-size:0.85rem; font-weight:600; }
.att-time-item span { color:var(--muted); }
.att-time-item strong { color:var(--text); }
.att-active { color:var(--primary); font-size:0.85rem; font-weight:800; }
.absence-list { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
.absence-chip { background:rgba(255,179,71,0.1); border:1.5px solid rgba(255,179,71,0.25); border-radius:99px; padding:3px 12px; font-size:0.78rem; font-weight:700; color:var(--amber); }
.absence-chip .reason { color:var(--text); }
.no-checkin { color:var(--muted); font-size:0.85rem; font-weight:600; }

.group-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 20px; margin-bottom:10px; display:flex; align-items:center; justify-content:space-between; transition:all 0.2s; box-shadow:var(--shadow); }
.group-card:hover { border-color:rgba(255,143,171,0.3); transform:translateY(-1px); }
.group-name { font-weight:800; font-size:1rem; }
.group-meta { color:var(--muted); font-size:0.78rem; font-weight:600; margin-top:3px; }

.toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:13px 22px; font-size:0.88rem; font-weight:700; display:none; z-index:100; backdrop-filter:blur(12px); box-shadow:0 8px 28px rgba(180,120,200,0.2); }
.toast.success { border-color:rgba(107,203,119,0.4); color:#3a9b44; background:rgba(107,203,119,0.08); }
.toast.error { border-color:rgba(255,107,107,0.35); color:var(--red); background:rgba(255,107,107,0.07); }

.modal-bg { display:none; position:fixed; inset:0; background:rgba(61,43,86,0.4); backdrop-filter:blur(8px); z-index:200; align-items:center; justify-content:center; }
.modal-bg.show { display:flex; }
.modal { background:var(--surface); border:1.5px solid var(--border); border-radius:22px; padding:28px; width:340px; box-shadow:0 20px 60px rgba(180,120,200,0.3); }
.modal h3 { font-size:1rem; font-weight:900; margin-bottom:16px; color:var(--text); }
.modal input, .modal select { width:100%; background:#faf7fd; border:1.5px solid var(--border); border-radius:12px; color:var(--text); padding:10px 13px; font-size:0.9rem; font-family:'Nunito',sans-serif; font-weight:600; margin-bottom:14px; outline:none; }
.modal input:focus, .modal select:focus { border-color:var(--primary); }
.modal select option { background:#fff; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; }
.empty-state { text-align:center; color:var(--muted); padding:60px 0; font-size:0.9rem; font-weight:700; }
.inactive-row td { opacity:0.6; }
.inactive-badge { font-size:0.68rem; font-weight:800; padding:2px 8px; border-radius:99px; background:rgba(255,107,107,0.1); border:1.5px solid rgba(255,107,107,0.25); color:var(--red); }
.group-stat-card { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:18px 22px; margin-bottom:12px; display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
.group-stat-name { font-size:1rem; font-weight:900; min-width:80px; }
.group-stat-bar-wrap { flex:1; background:rgba(200,180,220,0.15); border-radius:99px; height:8px; overflow:hidden; }
.group-stat-bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary),#c77dff); transition:width 0.7s ease; }
</style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div>
<div class="header">
  <h1>🌸 공부 트래커 관리자</h1>
  <div class="header-right">
    <span id="adminName"></span>
    <span id="roleBadge" class="badge"></span>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
</div>
<div class="container">
  <div class="tabs" id="tabBar">
    <button class="tab active" onclick="switchTab('users', this)">👥 유저 관리</button>
    <button class="tab" onclick="switchTab('stats', this)">📊 공부 통계</button>
    <button class="tab" onclick="switchTab('attendance', this)">🕐 출퇴근 기록</button>
    <button class="tab" onclick="switchTab('cheats', this)">🚨 치트 감지</button>
    <button class="tab" id="activityTab" style="display:none" onclick="switchTab('activity', this)">✏️ 기록 수정</button>
    <button class="tab" onclick="switchTab('goals', this)">🎯 목표 설정</button>
    <button class="tab" onclick="switchTab('group-stats', this)">📊 그룹 통계</button>
    <button class="tab" onclick="switchTab('absence-stats', this)">🚶 외출 통계</button>
    <button class="tab" onclick="switchTab('feedbacks', this)">💬 피드백</button>
    <button class="tab" id="noticeTab" style="display:none" onclick="switchTab('notices', this)">📢 공지 관리</button>
    <button class="tab" id="animalTab" style="display:none" onclick="switchTab('animals', this)">🐾 동물 관리</button>
    <button class="tab" id="groupTab" style="display:none" onclick="switchTab('groups', this)">🏠 그룹 관리</button>
    <button class="tab" id="shopTab" style="display:none" onclick="switchTab('shop', this)">🛍️ 상점 관리</button>
    <button class="tab" id="pointsTab" style="display:none" onclick="switchTab('points', this)">💎 포인트 관리</button>
    <button class="tab" id="clientTab" style="display:none" onclick="switchTab('client', this)">💻 클라이언트 배포</button>
    <button class="tab" id="backupTab" style="display:none" onclick="switchTab('backup', this)">💾 DB 백업</button>
  </div>

  <div id="tab-users">
    <div class="create-form">
      <div class="form-group"><label>아이디</label><input type="text" id="newUsername" placeholder="아이디"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" id="newPassword" placeholder="비밀번호"></div>
      <div class="form-group" id="roleFormGroup"><label>권한</label><select id="newRole"><option value="member">일반 유저</option><option value="group_admin">그룹 관리자</option></select></div>
      <div class="form-group" id="groupFormGroup"><label>그룹</label><select id="newGroupId"><option value="">그룹 없음</option></select></div>
      <div class="form-group" id="myGroupInfo" style="display:none"><label>그룹</label><div style="background:#faf7fd;border:1.5px solid var(--border);border-radius:12px;padding:9px 13px;font-size:0.9rem;font-weight:700;color:var(--primary)" id="myGroupName">내 그룹</div></div>
      <button class="btn btn-primary" onclick="createUser()" style="align-self:flex-end">+ 유저 생성</button>
    </div>
    <table>
      <thead><tr><th>아이디</th><th>권한</th><th>그룹</th><th>상태</th><th>오늘 활동</th><th>버전</th><th>생성일</th><th>관리</th></tr></thead>
      <tbody id="userTableBody"></tbody>
    </table>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="date-bar"><input type="date" id="statsDate"><button class="btn btn-primary" onclick="loadStats()">조회</button></div>
    <div id="statsList"></div>
  </div>

  <div id="tab-attendance" style="display:none">
    <div class="date-bar"><input type="date" id="attDate"><button class="btn btn-primary" onclick="loadAttendance()">조회</button></div>
    <div id="attList"></div>
  </div>

  <div id="tab-cheats" style="display:none">
    <div class="date-bar"><input type="date" id="cheatDate"><button class="btn btn-primary" onclick="loadCheats()">조회</button></div>
    <div id="cheatList"></div>
  </div>

  <div id="tab-client" style="display:none">
    <div class="create-form" style="flex-direction:column;align-items:flex-start;gap:16px">
      <div style="width:100%">
        <div style="font-size:0.78rem;font-weight:800;color:var(--text-light);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">현재 배포 버전</div>
        <div id="currentVersion" style="font-size:1.8rem;font-weight:900;color:var(--primary)">로딩 중...</div>
        <a id="downloadLink" href="/client/download" style="font-size:0.8rem;font-weight:700;color:var(--muted);text-decoration:none;display:block;margin-top:5px">다운로드: /client/download</a>
      </div>
      <div id="clientSuperAdminSection">
        <hr style="border-color:var(--border);width:100%">
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn btn-primary" onclick="syncGithub()" id="syncBtn">🔄 GitHub에서 동기화</button>
          <span style="font-size:0.85rem;font-weight:600;color:var(--text-light)">GitHub Release 최신 버전 자동 가져오기</span>
        </div>
        <hr style="border-color:var(--border);width:100%">
        <div style="font-size:0.78rem;font-weight:800;color:var(--text-light);letter-spacing:1px;text-transform:uppercase">수동 업로드</div>
        <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
          <div class="form-group"><label>버전 번호</label><input type="text" id="uploadVersion" placeholder="예: 1.0.1" style="min-width:120px"></div>
          <div class="form-group"><label>ZIP 파일</label><input type="file" id="uploadFile" accept=".zip" style="min-width:200px;color:var(--text)"></div>
          <button class="btn btn-primary" onclick="uploadClient()">업로드</button>
        </div>
        <div id="uploadStatus" style="font-size:0.85rem;font-weight:600;color:var(--muted)"></div>
      </div>
    </div>
  </div>

  <div id="tab-activity" style="display:none">
    <div class="date-bar"><input type="date" id="actDate"><button class="btn btn-primary" onclick="loadActivity()">조회</button></div>
    <div id="actList"></div>
  </div>

  <div id="tab-goals" style="display:none">
    <div class="create-form">
      <div class="form-group"><label>유형</label><select id="goalType" onchange="onGoalTypeChange()"><option value="default">전체 기본</option><option value="group">그룹별</option><option value="personal">개인별 (superadmin)</option></select></div>
      <div class="form-group" id="goalGroupWrap" style="display:none"><label>그룹</label><select id="goalGroupId"><option value="">선택</option></select></div>
      <div class="form-group" id="goalUserWrap" style="display:none"><label>유저</label><select id="goalUsername"><option value="">선택</option></select></div>
      <div class="form-group"><label>하루 목표 (분)</label><input type="number" id="goalMinutes" placeholder="예: 480" min="1" style="min-width:120px"></div>
      <button class="btn btn-primary" onclick="saveGoal()" style="align-self:flex-end">저장</button>
    </div>
    <div id="goalList"></div>
  </div>

  <div id="tab-group-stats" style="display:none">
    <div class="date-bar">
      <select id="groupStatsPeriod" style="background:#faf7fd;border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:8px 13px;font-size:0.88rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none">
        <option value="daily">일간</option>
        <option value="weekly">주간</option>
        <option value="monthly">월간</option>
      </select>
      <input type="date" id="groupStatsDate">
      <button class="btn btn-primary" onclick="loadGroupStats()">조회</button>
    </div>
    <div id="groupStatsList"></div>
  </div>

  <div id="tab-absence-stats" style="display:none">
    <div class="date-bar">
      <input type="date" id="absStart">
      <span style="color:var(--muted);font-weight:700">~</span>
      <input type="date" id="absEnd">
      <button class="btn btn-primary" onclick="loadAbsenceStats()">조회</button>
    </div>
    <div id="absStatsList"></div>
  </div>

  <div id="tab-backup" style="display:none">
    <div class="create-form" style="flex-direction:column;align-items:flex-start;gap:14px">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-primary" onclick="runBackup()" id="backupBtn">💾 지금 백업</button>
        <span style="font-size:0.85rem;font-weight:600;color:var(--text-light)">최근 7일치 자동 보관 · 매일 자정 자동 실행</span>
      </div>
      <div id="backupList" style="width:100%"></div>
    </div>
  </div>

  <div id="tab-feedbacks" style="display:none">
    <div class="date-bar" style="margin-bottom:18px">
      <select id="feedbackCat" style="background:#faf7fd;border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:8px 13px;font-size:0.88rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none">
        <option value="">전체</option>
        <option value="bug">🐛 버그 신고</option>
        <option value="suggestion">✨ 기능 제안</option>
        <option value="general">💬 기타 의견</option>
      </select>
      <button class="btn btn-primary" onclick="loadFeedbacks()">조회</button>
      <a href="/feedback" class="btn btn-primary" style="text-decoration:none">✏️ 피드백 작성</a>
    </div>
    <div id="feedbackList"></div>
  </div>

  <div id="tab-notices" style="display:none">
    <div class="create-form">
      <div class="form-group"><label>제목</label><input type="text" id="noticeTitle" placeholder="공지 제목"></div>
      <div class="form-group" style="flex:2"><label>내용</label><textarea id="noticeBody" placeholder="공지 내용" style="background:#faf7fd;border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:9px 13px;font-size:0.9rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none;resize:vertical;min-height:80px;width:100%"></textarea></div>
      <div class="form-group"><label>대상 그룹</label><select id="noticeGroupId"><option value="">전체</option></select></div>
      <button class="btn btn-primary" onclick="createNotice()" style="align-self:flex-end">+ 공지 등록</button>
    </div>
    <div id="noticeList"></div>
  </div>

  <div id="tab-animals" style="display:none">
    <div id="animalList"></div>
  </div>

  <div id="tab-groups" style="display:none">
    <div class="create-form">
      <div class="form-group"><label>그룹명</label><input type="text" id="newGroupName" placeholder="예: C.C, IT, C.S"></div>
      <button class="btn btn-primary" onclick="createGroup()" style="align-self:flex-end">+ 그룹 생성</button>
    </div>
    <div id="groupList"></div>
  </div>

  <div id="tab-shop" style="display:none">
    <div class="create-form" style="flex-direction:column;align-items:flex-start;gap:12px">
      <div style="font-size:0.78rem;font-weight:800;color:var(--text-light);letter-spacing:1px;text-transform:uppercase">새 아이템 등록</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;width:100%">
        <div class="form-group"><label>이름</label><input type="text" id="shopItemName" placeholder="예: 별 왕관" style="min-width:120px"></div>
        <div class="form-group"><label>슬롯</label><select id="shopItemSlot"><option value="hat">🎩 모자</option><option value="top">👕 상의</option><option value="accessory">✨ 액세서리</option></select></div>
        <div class="form-group"><label>가격 (💎)</label><input type="number" id="shopItemPrice" placeholder="50" min="1" style="min-width:80px"></div>
      </div>
      <div class="form-group" style="width:100%"><label>SVG 데이터</label><textarea id="shopItemSvg" rows="4" style="width:100%;font-family:monospace;font-size:0.75rem;border:1.5px solid var(--border);border-radius:10px;padding:8px;resize:vertical" placeholder='<svg viewBox="0 0 100 150" ...>...</svg>'></textarea></div>
      <button class="btn btn-primary" onclick="createShopItem()">+ 아이템 등록</button>
    </div>
    <div id="shopItemList"></div>
  </div>

  <div id="tab-points" style="display:none">
    <div class="create-form" style="flex-direction:column;align-items:flex-start;gap:12px">
      <div style="font-size:0.78rem;font-weight:800;color:var(--text-light);letter-spacing:1px;text-transform:uppercase">포인트 수동 조정</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="form-group"><label>유저</label><input type="text" id="adjustUsername" placeholder="아이디" style="min-width:120px"></div>
        <div class="form-group"><label>양 (±)</label><input type="number" id="adjustAmount" placeholder="예: 100 or -50" style="min-width:100px"></div>
        <div class="form-group"><label>사유</label><input type="text" id="adjustReason" placeholder="관리자 조정" style="min-width:120px"></div>
      </div>
      <button class="btn btn-primary" onclick="adjustPoints()">포인트 조정</button>
    </div>
    <div id="pointsList"></div>
  </div>
</div>

<div class="modal-bg" id="pwModal">
  <div class="modal">
    <h3>🔑 비밀번호 변경</h3>
    <input type="password" id="newPw" placeholder="새 비밀번호">
    <div class="modal-actions">
      <button class="btn" style="background:rgba(200,180,220,0.15);border:1.5px solid var(--border);color:var(--text-light)" onclick="closeModal('pwModal')">취소</button>
      <button class="btn btn-primary" onclick="confirmPwChange()">변경</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="groupModal">
  <div class="modal">
    <h3>🏠 그룹 변경</h3>
    <select id="moveGroupId"><option value="">그룹 없음</option></select>
    <div class="modal-actions">
      <button class="btn" style="background:rgba(200,180,220,0.15);border:1.5px solid var(--border);color:var(--text-light)" onclick="closeModal('groupModal')">취소</button>
      <button class="btn btn-primary" onclick="confirmGroupChange()">변경</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return {}; } }
  const token = localStorage.getItem('token');
  const {role, sub: _adminUsername, group_id: _adminGroupId} = parseJwt(token);
  const isSuperAdmin = role === 'superadmin';
  const isGroupAdmin = role === 'group_admin';
  if (!token || !['superadmin', 'group_admin'].includes(role)) location.href = '/';
  document.getElementById('adminName').textContent = _adminUsername || '';
  const badge = document.getElementById('roleBadge');
  badge.textContent = isSuperAdmin ? 'SUPER ADMIN' : 'GROUP ADMIN';
  badge.className = 'badge badge-' + role;
  if (isSuperAdmin) {
    document.getElementById('groupTab').style.display='';
    document.getElementById('clientTab').style.display='';
    document.getElementById('backupTab').style.display='';
    document.getElementById('activityTab').style.display='';
    document.getElementById('animalTab').style.display='';
    document.getElementById('noticeTab').style.display='';
    document.getElementById('shopTab').style.display='';
    document.getElementById('pointsTab').style.display='';
  }
  if (isGroupAdmin) {
    document.getElementById('clientTab').style.display='';
    document.getElementById('clientSuperAdminSection').style.display='none';
    document.getElementById('roleFormGroup').style.display='none';
    document.getElementById('groupFormGroup').style.display='none';
    document.getElementById('myGroupInfo').style.display='';
  }

  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmtMin(m) { m = Math.round(m || 0); const h = Math.floor(m / 60), r = m % 60; if (h === 0) return r + '분'; if (r === 0) return h + '시간'; return h + '시간 ' + r + '분'; }

  let editingUserId = null, groups = [];
  function authH() { return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }; }
  function logout() { localStorage.clear(); location.href = '/'; }

  let _currentTab = 'users';
  function switchTab(tab, el) {
    _currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    ['users','stats','attendance','cheats','activity','goals','group-stats','absence-stats','feedbacks','notices','animals','groups','shop','points','client','backup'].forEach(t => {
      const div = document.getElementById('tab-' + t);
      if (div) div.style.display = t === tab ? 'block' : 'none';
    });
    if (tab === 'stats') loadStats();
    if (tab === 'attendance') loadAttendance();
    if (tab === 'groups') loadGroups();
    if (tab === 'cheats') loadCheats();
    if (tab === 'client') loadClientVersion();
    if (tab === 'activity') loadActivity();
    if (tab === 'goals') loadGoals();
    if (tab === 'group-stats') loadGroupStats();
    if (tab === 'absence-stats') loadAbsenceStats();
    if (tab === 'backup') loadBackups();
    if (tab === 'feedbacks') loadFeedbacks();
    if (tab === 'notices') loadNotices();
    if (tab === 'animals') loadAnimals();
    if (tab === 'shop') loadAdminShop();
    if (tab === 'points') loadAdminPoints();
  }

  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast'); el.textContent = msg;
    el.className = 'toast ' + type; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  }
  function roleName(r) { if (r==='superadmin') return '슈퍼 어드민'; if (r==='group_admin') return '그룹 관리자'; return '일반'; }

  async function loadGroupOptions() {
    const res = await fetch('/admin/groups', { headers: authH() });
    if (!res.ok) return;
    groups = await res.json();
    ['newGroupId','moveGroupId','noticeGroupId'].forEach(id => {
      const sel = document.getElementById(id); if (!sel) return;
      const cur = sel.value;
      sel.innerHTML = '<option value="">그룹 없음</option>' + groups.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join('');
      if (cur) sel.value = cur;
    });
    if (isGroupAdmin) {
      const myGroup = groups.find(g => g.id === (_adminGroupId || 0));
      if (myGroup) document.getElementById('myGroupName').textContent = myGroup.name;
    }
  }

  async function loadUsers() {
    await loadGroupOptions();
    const res = await fetch('/admin/users', { headers: authH() });
    if (!res.ok) { logout(); return; }
    const users = await res.json();
    window._allUsers = users;
    const maxSec = Math.max(...users.map(u => u.today_seconds), 1);
    const today7ago = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
    document.getElementById('userTableBody').innerHTML = users.map(u => {
      const lastAct = u.last_activity_date;
      const isInactive = u.role === 'member' && (!lastAct || lastAct < today7ago);
      const inactiveDays = lastAct ? Math.floor((Date.now() - new Date(lastAct).getTime()) / 86400000) : null;
      const inactiveBadge = isInactive && u.is_active ? `<span class="inactive-badge">${inactiveDays ? inactiveDays + '일 미활동' : '기록없음'}</span> ` : '';
      return `<tr class="${isInactive && u.is_active ? 'inactive-row' : ''}">
        <td><strong>${esc(u.username)}</strong> ${inactiveBadge}</td>
        <td><span class="role-badge role-${u.role}">${roleName(u.role)}</span></td>
        <td>${u.group_name ? `<span class="group-badge">${esc(u.group_name)}</span>` : '<span style="color:var(--muted)">–</span>'}</td>
        <td><span class="status-dot ${u.is_active ? 'dot-active' : 'dot-inactive'}"></span>${u.is_active ? '활성' : '비활성'}</td>
        <td>${fmtMin(u.today_minutes)} <span class="time-bar-wrap"><span class="time-bar" style="width:${u.today_seconds/maxSec*100}%"></span></span></td>
        <td style="font-size:0.82rem;font-weight:700;color:${u.client_version ? 'var(--primary)' : 'var(--muted)'}">${esc(u.client_version || '-')}</td>
        <td style="color:var(--muted);font-size:0.82rem">${esc(u.created_at.slice(0,10))}</td>
        <td><div class="td-actions">
          <button class="btn-sm btn-warning" onclick="openPwModal(${u.id})">🔑 비번</button>
          ${u.role !== 'superadmin' ? `<button class="btn-sm" style="background:rgba(116,185,255,0.12);border:1.5px solid rgba(116,185,255,0.3);color:#0984e3" onclick="toggleActive(${u.id},${u.is_active})">${u.is_active ? '비활성화' : '활성화'}</button>` : ''}
          ${isSuperAdmin && u.role !== 'superadmin' ? `<button class="btn-sm" style="background:rgba(255,143,171,0.1);border:1.5px solid rgba(255,143,171,0.25);color:var(--primary)" onclick="openGroupModal(${u.id}, ${u.group_id||'null'})">🏠 그룹</button>` : ''}
          ${isSuperAdmin && u.role !== 'superadmin' ? `<button class="btn-sm" style="background:rgba(200,180,220,0.12);border:1.5px solid var(--border);color:var(--text-light)" onclick="toggleRole(${u.id},'${u.role}')">${u.role === 'group_admin' ? '일반으로' : '관리자로'}</button>` : ''}
          ${u.role !== 'superadmin' ? `<button class="btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️ 삭제</button>` : ''}
        </div></td>
      </tr>`;
    }).join('');
  }

  async function createUser() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const role = isSuperAdmin ? document.getElementById('newRole').value : 'member';
    const group_id = isSuperAdmin ? (document.getElementById('newGroupId').value || null) : null;
    if (!username || !password) { showToast('아이디와 비밀번호를 입력하세요', 'error'); return; }
    const res = await fetch('/admin/users', { method:'POST', headers:authH(), body:JSON.stringify({ username, password, role, group_id: group_id ? parseInt(group_id) : null }) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); document.getElementById('newUsername').value=''; document.getElementById('newPassword').value=''; loadUsers(); }
    else showToast(data.detail, 'error');
  }

  async function deleteUser(id) {
    const user = (window._allUsers || []).find(u => u.id === id);
    const username = user ? user.username : `ID ${id}`;
    if (!confirm(`'${username}' 계정을 삭제할까요?`)) return;
    const res = await fetch('/admin/users/'+id, { method:'DELETE', headers:authH() });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadUsers(); } else showToast(data.detail, 'error');
  }

  async function toggleActive(id, current) {
    const res = await fetch('/admin/users/'+id, { method:'PATCH', headers:authH(), body:JSON.stringify({is_active:!current}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadUsers(); } else showToast(data.detail, 'error');
  }

  async function toggleRole(id, currentRole) {
    const newRole = currentRole === 'group_admin' ? 'member' : 'group_admin';
    const res = await fetch('/admin/users/'+id, { method:'PATCH', headers:authH(), body:JSON.stringify({role:newRole}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadUsers(); } else showToast(data.detail, 'error');
  }

  function openPwModal(id) { editingUserId=id; document.getElementById('newPw').value=''; document.getElementById('pwModal').classList.add('show'); }
  function openGroupModal(id, currentGroupId) { editingUserId=id; document.getElementById('moveGroupId').value=currentGroupId||''; document.getElementById('groupModal').classList.add('show'); }
  function closeModal(id) { document.getElementById(id).classList.remove('show'); editingUserId=null; }

  async function confirmPwChange() {
    const pw = document.getElementById('newPw').value;
    if (!pw) { showToast('비밀번호를 입력하세요', 'error'); return; }
    const res = await fetch('/admin/users/'+editingUserId, { method:'PATCH', headers:authH(), body:JSON.stringify({password:pw}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); closeModal('pwModal'); } else showToast(data.detail, 'error');
  }

  async function confirmGroupChange() {
    const group_id = document.getElementById('moveGroupId').value;
    const res = await fetch('/admin/users/'+editingUserId, { method:'PATCH', headers:authH(), body:JSON.stringify({ group_id: group_id ? parseInt(group_id) : null }) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); closeModal('groupModal'); loadUsers(); } else showToast(data.detail, 'error');
  }

  async function loadGroups() {
    const res = await fetch('/admin/groups', { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('groupList');
    if (!data.length) { list.innerHTML = '<div class="empty-state">🏠 그룹이 없습니다</div>'; return; }
    list.innerHTML = data.map(g => `<div class="group-card"><div><div class="group-name">${esc(g.name)}</div><div class="group-meta">생성일: ${g.created_at.slice(0,10)}</div></div><button class="btn-sm btn-danger" onclick="deleteGroup(${g.id},${JSON.stringify(g.name).replace(/</g,'\\u003c')})">🗑️ 삭제</button></div>`).join('');
  }

  async function createGroup() {
    const name = document.getElementById('newGroupName').value.trim();
    if (!name) { showToast('그룹명을 입력하세요', 'error'); return; }
    const res = await fetch('/admin/groups', { method:'POST', headers:authH(), body:JSON.stringify({name}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); document.getElementById('newGroupName').value=''; loadGroups(); loadGroupOptions(); }
    else showToast(data.detail, 'error');
  }

  async function deleteGroup(id, name) {
    if (!confirm(`'${name}' 그룹을 삭제할까요?\n소속 유저의 그룹이 해제됩니다.`)) return;
    const res = await fetch('/admin/groups/'+id, { method:'DELETE', headers:authH() });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadGroups(); loadGroupOptions(); } else showToast(data.detail, 'error');
  }

  async function loadStats() {
    const d = document.getElementById('statsDate').value || new Date().toISOString().split('T')[0];
    const res = await fetch('/api/stats?target_date='+d, { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('statsList');
    if (!data.length) { list.innerHTML = '<div class="empty-state">📊 기록이 없습니다</div>'; return; }
    const max = data[0].active_minutes;
    const medals = ['🥇','🥈','🥉'];
    list.innerHTML = data.map((u,i) => `
      <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)">
        <div style="font-size:1.4rem;min-width:32px;text-align:center">${medals[i]||'#'+(i+1)}</div>
        <div style="flex:1"><div style="font-weight:800">${esc(u.username)}</div><div style="color:var(--primary);font-size:0.82rem;font-weight:700;margin-top:2px">${fmtMin(u.active_minutes)} 활동</div></div>
        <div style="flex:2;background:rgba(200,180,220,0.15);border-radius:99px;height:8px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,var(--primary),#c77dff);border-radius:99px;width:${max>0?u.active_minutes/max*100:0}%"></div></div>
      </div>
    `).join('');
  }

  async function loadAttendance() {
    const d = document.getElementById('attDate').value || new Date().toISOString().split('T')[0];
    const res = await fetch('/admin/attendance?target_date='+d, { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('attList');
    list.innerHTML = data.map(u => `
      <div class="att-card">
        <div class="att-header">
          <div class="att-name">${esc(u.username)}</div>
          <div class="att-active">📚 ${fmtMin(u.active_minutes)}</div>
        </div>
        ${u.checkin_at ? `<div class="att-times"><div class="att-time-item"><span>출근 </span><strong>${u.checkin_at}</strong></div><div class="att-time-item"><span>퇴근 </span><strong>${u.checkout_at || '–'}</strong></div></div>` : '<div class="no-checkin">출근 기록 없음</div>'}
        ${u.absences.length ? `<div class="absence-list">${u.absences.map(a=>`<div class="absence-chip"><span class="reason">${esc(a.reason)}</span> ${a.start}~${a.end||'진행중'}</div>`).join('')}</div>` : ''}
      </div>
    `).join('');
  }

  async function loadCheats() {
    const d = document.getElementById('cheatDate').value || new Date().toISOString().split('T')[0];
    const res = await fetch('/admin/cheats?target_date='+d, { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('cheatList');
    if (!data.length) { list.innerHTML = '<div class="empty-state">✅ 감지된 치트가 없습니다</div>'; return; }
    list.innerHTML = `<table><thead><tr><th>시각</th><th>유저</th><th>감지 내용</th></tr></thead><tbody>${data.map(c=>`<tr><td style="color:var(--muted);font-size:0.82rem">${c.detected_at}</td><td><strong>${esc(c.username)}</strong></td><td style="color:var(--red)">${esc(c.reason)}</td></tr>`).join('')}</tbody></table>`;
  }

  let editingLogId = null;
  async function loadActivity() {
    const d = document.getElementById('actDate').value || new Date().toISOString().split('T')[0];
    const res = await fetch('/admin/activity?target_date='+d, { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('actList');
    const addRow = `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)"><div style="font-size:0.78rem;font-weight:800;color:var(--text-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">📝 기록 직접 추가</div><div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end"><div class="form-group"><label>유저</label><select id="newActUser" style="min-width:120px">${(window._allUsers||[]).map(u=>`<option value="${esc(u.username)}">${esc(u.username)}</option>`).join('')}</select></div><div class="form-group"><label>날짜</label><input type="date" id="newActDate" value="${d}"></div><div class="form-group"><label>활동 시간 (분)</label><input type="number" id="newActMinutes" min="0" placeholder="예: 120" style="min-width:100px"></div><button class="btn btn-primary" onclick="createActivity()">추가</button></div></div>`;
    if (!data.length) { list.innerHTML = addRow + '<div class="empty-state">기록이 없습니다</div>'; return; }

  function startEdit(id) { document.getElementById('disp-'+id).style.display='none'; document.getElementById('inp-'+id).style.display=''; document.getElementById('editBtn-'+id).style.display='none'; document.getElementById('saveBtn-'+id).style.display=''; document.getElementById('cancelBtn-'+id).style.display=''; }
  function cancelEdit(id, origMinutes) { document.getElementById('inp-'+id).value=origMinutes; document.getElementById('disp-'+id).style.display=''; document.getElementById('inp-'+id).style.display='none'; document.getElementById('editBtn-'+id).style.display=''; document.getElementById('saveBtn-'+id).style.display='none'; document.getElementById('cancelBtn-'+id).style.display='none'; }

  async function saveActivity(id) {
    const minutes = parseFloat(document.getElementById('inp-'+id).value);
    if (isNaN(minutes)||minutes<0) { showToast('올바른 값을 입력하세요','error'); return; }
    const res = await fetch('/admin/activity/'+id, { method:'PATCH', headers:authH(), body:JSON.stringify({active_seconds:minutes*60}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); document.getElementById('disp-'+id).textContent=fmtMin(minutes); cancelEdit(id,minutes); }
    else showToast(data.detail,'error');
  }

  async function createActivity() {
    const username = document.getElementById('newActUser').value;
    const date = document.getElementById('newActDate').value;
    const minutes = parseFloat(document.getElementById('newActMinutes').value);
    if (!username||!date) { showToast('유저와 날짜를 입력하세요','error'); return; }
    if (isNaN(minutes)||minutes<0) { showToast('활동 시간을 입력하세요','error'); return; }
    const res = await fetch('/admin/activity', { method:'POST', headers:authH(), body:JSON.stringify({username,date,active_seconds:minutes*60}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadActivity(); } else showToast(data.detail,'error');

  function onGoalTypeChange() {
    const type = document.getElementById('goalType').value;
    document.getElementById('goalGroupWrap').style.display = type === 'group' ? '' : 'none';
    document.getElementById('goalUserWrap').style.display = type === 'personal' ? '' : 'none';

  async function loadGoals() {
    await loadGroupOptions();
    // goalGroupId 드롭다운 옵션 설정
    const groupSel = document.getElementById('goalGroupId');
    groupSel.innerHTML = '<option value="">선택</option>' + groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join('');
    // 개인 목표용 유저 드롭다운
    if (isSuperAdmin) {
      const userSel = document.getElementById('goalUsername');
      const allUsers = window._allUsers || [];
      userSel.innerHTML = '<option value="">선택</option>' + allUsers.filter(u=>u.role!=='superadmin').map(u=>`<option value="${esc(u.username)}">${esc(u.username)}</option>`).join('');
    } else {
      document.getElementById('goalType').querySelector('option[value="personal"]').disabled = true;
    }
    const res = await fetch('/admin/goals', { headers: authH() });

    list.innerHTML = `<table><thead><tr><th>대상</th><th>하루 목표</th><th>주간</th><th>관리</th></tr></thead><tbody>${data.map(g=>{
      const label = g.username ? '👤 ' + esc(g.username) : (g.group_name ? '🏠 ' + esc(g.group_name) : '🌐 전체 기본');
      return `<tr><td><strong>${label}</strong></td><td>${fmtMin(g.daily_target_minutes)}</td><td style="color:var(--muted)">${fmtMin(g.daily_target_minutes*7)}</td><td>${isSuperAdmin?`<button class="btn-sm btn-danger" onclick="deleteGoal(${g.id})">🗑️ 삭제</button>`:''}</td></tr>`;
    }).join('')}</tbody></table>`;
  }

  async function saveGoal() {
    const type = document.getElementById('goalType').value;
    const minutes = parseInt(document.getElementById('goalMinutes').value);
    if (!minutes||minutes<1) { showToast('목표 시간을 입력하세요','error'); return; }
    let body = { daily_target_minutes: minutes };
    if (type === 'group') {
      const gid = document.getElementById('goalGroupId').value;
      if (!gid) { showToast('그룹을 선택하세요','error'); return; }
      body.group_id = parseInt(gid);
    } else if (type === 'personal') {
      const uname = document.getElementById('goalUsername').value;
      if (!uname) { showToast('유저를 선택하세요','error'); return; }
      body.username = uname;
    }
    const res = await fetch('/admin/goals', { method:'POST', headers:authH(), body:JSON.stringify(body) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); document.getElementById('goalMinutes').value=''; loadGoals(); } else showToast(data.detail,'error');
  }

  async function deleteGoal(id) {
    if (!confirm('목표를 삭제할까요?')) return;
    const res = await fetch('/admin/goals/'+id, { method:'DELETE', headers:authH() });

    if (start) params.push('start_date='+start);

    const byUserRows = data.by_user.map(u=>`<tr><td><strong>${esc(u.username)}</strong></td><td>${u.count}회</td><td style="color:var(--muted)">${fmtMin(u.total_minutes)}</td></tr>`).join('');

  const CAT_LABELS = { bug: '🐛 버그', suggestion: '✨ 제안', general: '💬 기타' };
  const CAT_COLORS = { bug: 'rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.3);color:var(--red)', suggestion: 'rgba(116,185,255,0.1);border-color:rgba(116,185,255,0.3);color:#0984e3', general: 'rgba(255,143,171,0.1);border-color:rgba(255,143,171,0.3);color:var(--primary)' };
  async function loadFeedbacks() {
    const cat = document.getElementById('feedbackCat').value;
    const url = '/admin/feedbacks' + (cat ? '?category=' + cat : '');
    const list = document.getElementById('feedbackList');
    list.innerHTML = '<div class="empty-state">불러오는 중...</div>';
    const res = await fetch(url, { headers: authH() });
    if (!res.ok) { list.innerHTML = '<div class="empty-state">불러오기 실패 😢</div>'; return; }
    const data = await res.json();
    if (!data.length) { list.innerHTML = '<div class="empty-state">피드백이 없습니다 🌸</div>'; return; }
    list.innerHTML = data.map(fb => {
      const catStyle = CAT_COLORS[fb.category] || '';
      const resolvedBadge = fb.is_resolved
        ? `<span class="role-badge" style="background:rgba(107,203,119,0.12);border-color:rgba(107,203,119,0.4);color:#27ae60">✅ 처리완료</span>`
        : `<span class="role-badge" style="background:rgba(255,179,71,0.12);border-color:rgba(255,179,71,0.4);color:#e67e22">⏳ 미처리</span>`;
      const commentHtml = fb.admin_comment
        ? `<div style="margin-top:8px;padding:8px 12px;background:rgba(107,203,119,0.08);border:1.5px solid rgba(107,203,119,0.25);border-radius:10px;font-size:0.85rem;color:#27ae60;font-weight:600">💬 ${esc(fb.admin_comment)}</div>` : '';
      return `<div class="att-card" style="opacity:${fb.is_resolved ? 0.7 : 1}">
        <div class="att-header">
          <span class="att-name">${esc(fb.title)}</span>
          <span class="role-badge" style="background:${catStyle.split(';')[0]};${catStyle.split(';').slice(1).join(';')}">${CAT_LABELS[fb.category]||fb.category}</span>
          ${resolvedBadge}
          <span style="font-size:0.78rem;color:var(--muted);font-weight:700">${esc(fb.created_at)}</span>
        </div>
        <div style="font-size:0.85rem;font-weight:700;color:var(--text-light);margin-bottom:8px">by <strong>${esc(fb.username)}</strong></div>
        <div style="font-size:0.88rem;font-weight:600;color:var(--text);line-height:1.7;white-space:pre-wrap">${esc(fb.body)}</div>
        ${commentHtml}
        <div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="text" id="comment-${fb.id}" placeholder="코멘트 (선택)" value="${esc(fb.admin_comment||'')}" style="flex:1;min-width:160px;background:#faf7fd;border:1.5px solid var(--border);border-radius:10px;padding:6px 11px;font-size:0.85rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none;color:var(--text)">
          <button class="btn-sm" style="background:rgba(107,203,119,0.12);border:1.5px solid rgba(107,203,119,0.35);color:#27ae60" onclick="resolveFeedback(${fb.id}, true)">${fb.is_resolved ? '✅ 완료' : '처리완료'}</button>
          <button class="btn-sm" style="background:rgba(255,179,71,0.12);border:1.5px solid rgba(255,179,71,0.35);color:#e67e22" onclick="resolveFeedback(${fb.id}, false)">미처리</button>
          <button class="btn-sm btn-danger" onclick="deleteFeedback(${fb.id})">삭제</button>
        </div>
      </div>`;
    }).join('');
  }
  async function resolveFeedback(id, resolved) {

  async function createNotice() {

    const group_id = groupIdVal ? parseInt(groupIdVal) : null;

                  <select id="animalSel-${u.id}" style="background:#faf7fd;border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:5px 10px;font-size:0.85rem;font-family:'Nunito',sans-serif;font-weight:600;outline:none">
                    <option value="-1"${isAuto?' selected':''}>자동</option>
                    ${ANIMAL_NAMES.map((n,i)=>`<option value="${i}"${u.animal_type===i?' selected':''}>${ANIMAL_EMOJIS[i]} ${n}</option>`).join('')}
                  </select>
                  <button class="btn-sm btn-primary" onclick="setAnimal(${u.id})">저장</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  async function setAnimal(userId) {
    const sel = document.getElementById('animalSel-' + userId);
    const animal_type = parseInt(sel.value);
    const res = await fetch('/admin/users/' + userId, { method:'PATCH', headers:authH(), body:JSON.stringify({animal_type}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadAnimals(); } else showToast(data.detail, 'error');
  }

  async function loadBackups() {
    const res = await fetch('/admin/backups', { headers: authH() });
    const data = await res.json();
    const list = document.getElementById('backupList');
    if (!data.length) { list.innerHTML='<div style="font-size:0.85rem;font-weight:700;color:var(--muted)">백업 파일이 없습니다</div>'; return; }
    list.innerHTML = `<table><thead><tr><th>파일명</th><th>크기</th><th>생성일시</th></tr></thead><tbody>${data.map(b=>`<tr><td style="color:var(--muted);font-size:0.82rem">${esc(b.filename)}</td><td>${esc(String(b.size_kb))} KB</td><td style="color:var(--muted);font-size:0.82rem">${esc(b.created_at)}</td></tr>`).join('')}</tbody></table>`;
  }

  async function runBackup() {
    const btn = document.getElementById('backupBtn'); btn.textContent='백업 중...'; btn.disabled=true;
    const res = await fetch('/admin/backup', { method:'POST', headers:authH() });
    const data = await res.json();
    btn.textContent='💾 지금 백업'; btn.disabled=false;
    if (res.ok) { showToast(data.message); loadBackups(); } else showToast(data.detail,'error');
  }

  async function syncGithub() {
    const btn = document.getElementById('syncBtn'); btn.textContent='동기화 중...'; btn.disabled=true;
    const res = await fetch('/admin/client/sync-github', { method:'POST', headers:authH() });
    const data = await res.json();
    btn.textContent='🔄 GitHub에서 동기화'; btn.disabled=false;
    if (res.ok) { showToast(data.message); loadClientVersion(); } else showToast(data.detail,'error');
  }

  async function loadClientVersion() {
    const res = await fetch('/client/version');
    const data = await res.json();
    document.getElementById('currentVersion').textContent = 'v' + data.version;
  }

  async function uploadClient() {
    const version = document.getElementById('uploadVersion').value.trim();
    const file = document.getElementById('uploadFile').files[0];
    const status = document.getElementById('uploadStatus');
    if (!version) { showToast('버전 번호를 입력하세요','error'); return; }
    if (!file) { showToast('파일을 선택하세요','error'); return; }
    status.textContent = '업로드 중...';
    const form = new FormData(); form.append('file', file);
    const res = await fetch(`/admin/client/upload?version=${encodeURIComponent(version)}`, { method:'POST', headers:{'Authorization':'Bearer '+token}, body:form });
    const data = await res.json();
    if (res.ok) { showToast(data.message); status.textContent=`마지막 업로드: v${version} (${new Date().toLocaleString()})`; status.style.color='#3a9b44'; loadClientVersion(); }
    else { showToast(data.detail,'error'); status.textContent=''; }
  }

  const today = new Date().toISOString().split('T')[0];
  const weekAgo = new Date(Date.now()-6*86400000).toISOString().split('T')[0];
  document.getElementById('actDate').value = today;
  document.getElementById('statsDate').value = today;
  document.getElementById('attDate').value = today;
  document.getElementById('cheatDate').value = today;
  document.getElementById('absStart').value = weekAgo;
  document.getElementById('absEnd').value = today;
  document.getElementById('groupStatsDate').value = today;
  loadUsers();
  setInterval(() => { if (_currentTab === 'stats') loadStats(); if (_currentTab === 'group-stats') loadGroupStats(); }, 30000);

  // ── 상점 관리 ──────────────────────────────────────────────────
  async function loadAdminShop() {
    const res = await fetch('/admin/shop', { headers: authH() });
    if (!res.ok) return;
    const items = await res.json();
    const slotLabels = { hat: '🎩 모자', top: '👕 상의', accessory: '✨ 액세서리' };
    document.getElementById('shopItemList').innerHTML = items.length ? `
      <table><thead><tr><th>ID</th><th>이름</th><th>슬롯</th><th>가격</th><th>상태</th><th>관리</th></tr></thead>
      <tbody>${items.map(i => `<tr>
        <td>${i.id}</td><td>${esc(i.name)}</td>
        <td>${slotLabels[i.slot]||i.slot}</td>
        <td>${i.price} 💎</td>
        <td><span class="role-badge" style="background:${i.is_active?'rgba(85,239,196,0.1);border-color:rgba(85,239,196,0.4);color:#00b894':'rgba(200,180,220,0.12);border-color:var(--border);color:var(--muted)'}">${i.is_active?'활성':'비활성'}</span></td>
        <td>
          <button class="btn-sm" onclick="toggleShopItem(${i.id},${i.is_active})">${i.is_active?'비활성화':'활성화'}</button>
          <button class="btn-sm btn-danger" onclick="deleteShopItem(${i.id})">삭제</button>
        </td>
      </tr>`).join('')}</tbody></table>` : '<div style="color:var(--muted);padding:20px;font-size:0.88rem">등록된 아이템 없음</div>';
  }

  async function createShopItem() {
    const name = document.getElementById('shopItemName').value.trim();
    const slot = document.getElementById('shopItemSlot').value;
    const price = parseInt(document.getElementById('shopItemPrice').value);
    const svg_data = document.getElementById('shopItemSvg').value.trim();
    if (!name || !price || !svg_data) { showToast('모든 항목을 입력해주세요', 'error'); return; }
    const res = await fetch('/admin/shop', { method:'POST', headers:authH(), body:JSON.stringify({name,slot,price,svg_data}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadAdminShop(); document.getElementById('shopItemName').value=''; document.getElementById('shopItemSvg').value=''; }
    else showToast(data.detail,'error');
  }

  async function toggleShopItem(id, isActive) {
    const res = await fetch('/admin/shop/'+id, { method:'PATCH', headers:authH(), body:JSON.stringify({is_active:!isActive}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadAdminShop(); } else showToast(data.detail,'error');
  }

  async function deleteShopItem(id) {
    if (!confirm('아이템을 삭제할까요?')) return;
    const res = await fetch('/admin/shop/'+id, { method:'DELETE', headers:authH() });
    const data = await res.json();
    if (res.ok) { showToast(data.message); loadAdminShop(); } else showToast(data.detail,'error');
  }

  // ── 포인트 관리 ──────────────────────────────────────────────────
  async function loadAdminPoints() {
    const res = await fetch('/admin/points', { headers: authH() });
    if (!res.ok) return;
    const rows = await res.json();
    document.getElementById('pointsList').innerHTML = rows.length ? `
      <table><thead><tr><th>유저</th><th>포인트</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${esc(r.username)}</td><td style="font-weight:900;color:var(--primary)">${r.points.toLocaleString()} 💎</td></tr>`).join('')}</tbody></table>`
      : '<div style="color:var(--muted);padding:20px;font-size:0.88rem">데이터 없음</div>';
  }

  async function adjustPoints() {
    const username = document.getElementById('adjustUsername').value.trim();
    const amount = parseInt(document.getElementById('adjustAmount').value);
    const reason = document.getElementById('adjustReason').value.trim() || '관리자 조정';
    if (!username || isNaN(amount)) { showToast('유저와 양을 입력해주세요', 'error'); return; }
    const res = await fetch('/admin/points/adjust', { method:'POST', headers:authH(), body:JSON.stringify({username,amount,reason}) });
    const data = await res.json();
    if (res.ok) { showToast(data.message + ' (' + data.new_points + '💎)'); loadAdminPoints(); }
    else showToast(data.detail,'error');
  }
</script>
</body>
</html>
