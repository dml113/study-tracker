<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공부 트래커 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fdf6f0; --surface:#fff; --primary:#ff8fab; --primary-dark:#e8738f;
  --accent:#ffd166; --mint:#6bcb77; --blue:#74b9ff;
  --text:#3d2b56; --text-light:#7b6b8d; --muted:#c4b5d5;
  --border:rgba(200,180,220,0.3); --shadow:0 4px 20px rgba(180,120,200,0.1);
  --gold:#ffb347; --silver:#b0b7c3; --bronze:#cd8b5a;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(200,180,220,0.15) 1px,transparent 1px); background-size:22px 22px; z-index:0; }
.blob { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; animation:blobFloat 18s ease-in-out infinite; }
.blob-1 { width:500px; height:500px; background:rgba(255,143,171,0.12); top:-200px; left:-150px; }
.blob-2 { width:400px; height:400px; background:rgba(168,216,234,0.1); bottom:-150px; right:-120px; animation-delay:-9s; }
@keyframes blobFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-15px)} }

.header {
  position:relative; z-index:10; background:rgba(255,255,255,0.88); backdrop-filter:blur(20px);
  border-bottom:1.5px solid var(--border); padding:0 28px; height:60px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { font-size:1.2rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-right { display:flex; align-items:center; gap:10px; }
.username-tag { font-size:0.82rem; font-weight:700; color:var(--text-light); }
.nav-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--text-light); padding:7px 16px; border-radius:99px; font-size:0.82rem; font-family:'Nunito',sans-serif; font-weight:700; text-decoration:none; cursor:pointer; transition:all 0.2s; }
.nav-btn:hover { border-color:var(--primary); color:var(--primary); }
.download-btn { background:linear-gradient(135deg,var(--primary),#c77dff); border:none; color:white; padding:7px 16px; border-radius:99px; font-size:0.82rem; font-family:'Nunito',sans-serif; font-weight:800; text-decoration:none; display:none; box-shadow:0 3px 12px rgba(255,143,171,0.35); transition:opacity 0.2s; }
.download-btn:hover { opacity:0.88; }

.container { position:relative; z-index:1; max-width:820px; margin:28px auto; padding:0 20px; }
.controls { display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.period-tabs { display:flex; gap:4px; background:rgba(200,180,220,0.12); border-radius:99px; padding:4px; border:1.5px solid var(--border); }
.period-tab { padding:7px 18px; border-radius:99px; cursor:pointer; font-size:0.85rem; font-weight:700; font-family:'Nunito',sans-serif; color:var(--text-light); border:none; background:none; transition:all 0.2s; }
.period-tab.active { background:linear-gradient(135deg,var(--primary),#c77dff); color:white; box-shadow:0 2px 10px rgba(255,143,171,0.35); }
.date-input { background:var(--surface); border:1.5px solid var(--border); color:var(--text); padding:8px 14px; border-radius:12px; font-size:0.85rem; font-family:'Nunito',sans-serif; font-weight:600; outline:none; }
.date-input:focus { border-color:var(--primary); }
.query-btn { background:rgba(255,143,171,0.1); border:1.5px solid rgba(255,143,171,0.3); color:var(--primary); padding:8px 18px; border-radius:12px; font-size:0.85rem; font-weight:700; font-family:'Nunito',sans-serif; cursor:pointer; transition:background 0.2s; }
.query-btn:hover { background:rgba(255,143,171,0.18); }
.period-label { font-size:0.8rem; font-weight:600; color:var(--text-light); margin-bottom:16px; }

/* Live */
.live-section { margin-bottom:22px; }
.live-header { display:flex; align-items:center; gap:7px; margin-bottom:10px; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--mint); box-shadow:0 0 8px rgba(107,203,119,0.7); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.live-label { font-size:0.78rem; font-weight:800; color:var(--text-light); letter-spacing:0.5px; }
.live-chips { display:flex; flex-wrap:wrap; gap:7px; }
.live-chip { padding:5px 14px; border-radius:99px; font-size:0.8rem; font-weight:700; }
.chip-present { background:rgba(107,203,119,0.12); border:1.5px solid rgba(107,203,119,0.3); color:#3a9b44; }
.chip-absent { background:rgba(255,209,102,0.15); border:1.5px solid rgba(255,209,102,0.4); color:#b5850a; }
.chip-none { color:var(--muted); font-size:0.82rem; font-weight:600; }

/* Section */
.section-title { font-size:0.8rem; font-weight:800; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1.5px; background:linear-gradient(90deg,var(--border),transparent); border-radius:99px; }

/* Rank cards */
.card {
  background:var(--surface); border:1.5px solid var(--border); border-radius:20px;
  padding:16px 20px; margin-bottom:10px; display:flex; align-items:center; gap:14px;
  box-shadow:var(--shadow); transition:transform 0.2s, box-shadow 0.2s;
  animation:slideIn 0.35s ease both;
}
.card:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(180,120,200,0.16); }
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.card-rank-1 { border-color:rgba(255,179,71,0.5); background:linear-gradient(135deg,#fffbf0,#fff); box-shadow:0 4px 20px rgba(255,179,71,0.2); }
.card-rank-2 { border-color:rgba(176,183,195,0.4); }
.card-rank-3 { border-color:rgba(205,139,90,0.35); }
.card-me { border-color:rgba(199,125,255,0.45) !important; box-shadow:0 4px 20px rgba(199,125,255,0.15) !important; }

.rank-badge {
  width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:900; flex-shrink:0;
}
.rank-1 { background:linear-gradient(135deg,#ffd700,#ffb347); color:white; box-shadow:0 3px 12px rgba(255,179,71,0.45); }
.rank-2 { background:linear-gradient(135deg,#d0d5e0,#b0b7c3); color:white; box-shadow:0 3px 10px rgba(176,183,195,0.35); }
.rank-3 { background:linear-gradient(135deg,#e8a870,#cd8b5a); color:white; box-shadow:0 3px 10px rgba(205,139,90,0.35); }
.rank-other { background:rgba(200,180,220,0.15); color:var(--muted); }

/* Egg widget */
.egg-widget { position:relative; width:56px; height:56px; flex-shrink:0; }
.egg-inner {
  position:absolute; top:7px; left:7px; right:7px; bottom:7px;
  border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08); overflow:hidden;
}
.egg-inner.animal { border-radius:50%; }
.egg-illust { width:36px; height:36px; display:block; }
.egg-illust.hatched { animation:pop 0.5s ease; }
@keyframes pop { 0%{transform:scale(0.7)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }

.info { flex:1; min-width:0; }
.name { font-size:0.98rem; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.me-tag { display:inline-block; font-size:0.65rem; font-weight:800; background:linear-gradient(135deg,var(--primary),#c77dff); color:white; border-radius:99px; padding:1px 7px; margin-left:6px; vertical-align:middle; }
.time { font-size:0.8rem; font-weight:600; color:var(--text-light); margin-top:2px; }
.egg-label { font-size:0.7rem; font-weight:700; color:var(--text-light); margin-top:2px; }

.bar-col { flex:2.2; }
.bar-wrap { background:rgba(200,180,220,0.18); border-radius:99px; height:7px; overflow:hidden; margin-bottom:5px; }
.bar { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--primary),#c77dff); transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1); }
.bar-gold { background:linear-gradient(90deg,#ffb347,#ffd700); }
.goal-row { display:flex; align-items:center; gap:8px; }
.goal-bar-wrap { flex:1; background:rgba(200,180,220,0.15); border-radius:99px; height:3.5px; overflow:hidden; }
.goal-bar { height:100%; border-radius:99px; transition:width 0.6s ease; }
.goal-text { font-size:0.7rem; font-weight:700; color:var(--muted); white-space:nowrap; }

.empty { text-align:center; color:var(--muted); padding:60px 0; font-size:0.9rem; font-weight:600; }
.updated { text-align:right; color:var(--muted); font-size:0.72rem; font-weight:600; margin-top:10px; }
</style>
</head>

<div class="blob blob-1"></div><div class="blob blob-2"></div>

  <div class="logo">🌸 공부 트래커</div>

  </div>

  <div id="board"></div>

<circle cx="38" cy="52" r="2" fill="white"/><circle cx="66" cy="52" r="2" fill="white"/>
<ellipse cx="50" cy="66" rx="4.5" ry="3.5" fill="#1A1A1A"/>
<path d="M45,70 Q50,76 55,70" stroke="#444" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<circle cx="29" cy="67" r="6" fill="rgba(255,160,180,0.28)"/><circle cx="71" cy="67" r="6" fill="rgba(255,160,180,0.28)"/>
</svg>`,
    // 7: 코알라 (회색, 큰 귀, 큰 코)
    `<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<circle cx="19" cy="37" r="20" fill="#B0A8C0"/><circle cx="81" cy="37" r="20" fill="#B0A8C0"/>
<circle cx="19" cy="37" r="13" fill="#D8D0E8"/><circle cx="81" cy="37" r="13" fill="#D8D0E8"/>
<circle cx="50" cy="61" r="31" fill="#C8BCD8"/>
<circle cx="37" cy="55" r="9" fill="white"/><circle cx="63" cy="55" r="9" fill="white"/>
<circle cx="37" cy="56" r="6.5" fill="#2A2240"/><circle cx="63" cy="56" r="6.5" fill="#2A2240"/>
<circle cx="39" cy="54" r="2.2" fill="white"/><circle cx="65" cy="54" r="2.2" fill="white"/>
<ellipse cx="50" cy="67" rx="9" ry="6.5" fill="#5A4878"/>
<ellipse cx="47.5" cy="65" rx="3" ry="2" fill="rgba(255,255,255,0.28)"/>
<path d="M44,74 Q50,80 56,74" stroke="#7A6898" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<circle cx="27" cy="66" r="7" fill="rgba(200,180,230,0.38)"/><circle cx="73" cy="66" r="7" fill="rgba(200,180,230,0.38)"/>
</svg>`
  ];

  function getEggStageSVG(stage, c) {
    const fc = 'rgba(0,0,0,0.38)';
    const bl = 'rgba(255,182,193,0.45)';
    if (stage === 0) return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<ellipse cx="37" cy="51" rx="8" ry="12" fill="rgba(255,255,255,0.28)" transform="rotate(-20 37 51)"/>
<path d="M34,67 Q40,62 46,67" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M54,67 Q60,62 66,67" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M43,76 Q50,81 57,76" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="33" cy="73" r="5" fill="${bl}"/><circle cx="67" cy="73" r="5" fill="${bl}"/>
<text x="66" y="51" font-family="Arial" font-size="10" fill="${fc}" font-weight="bold">z</text>
<text x="73" y="40" font-family="Arial" font-size="12" fill="${fc}" font-weight="bold" opacity="0.7">z</text>
<text x="81" y="29" font-family="Arial" font-size="14" fill="${fc}" font-weight="bold" opacity="0.45">z</text>
</svg>`;
    if (stage === 1) return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<ellipse cx="37" cy="51" rx="8" ry="12" fill="rgba(255,255,255,0.28)" transform="rotate(-20 37 51)"/>
<path d="M50,26 L47,36 L53,43 L50,50" stroke="${fc}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M53,30 L57,38" stroke="${fc}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<circle cx="38" cy="67" r="8" fill="white"/><circle cx="62" cy="67" r="8" fill="white"/>
<circle cx="38" cy="68" r="5.5" fill="#2A1A2A"/><circle cx="62" cy="68" r="5.5" fill="#2A1A2A"/>
<circle cx="40" cy="66" r="2" fill="white"/><circle cx="64" cy="66" r="2" fill="white"/>
<path d="M43,77 Q50,82 57,77" stroke="${fc}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
<circle cx="32" cy="74" r="5" fill="${bl}"/><circle cx="68" cy="74" r="5" fill="${bl}"/>
</svg>`;
    return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<path d="M18,56 Q28,35 50,29 Q72,35 82,56 Q70,51 64,58 Q58,45 52,52 Q46,41 40,49 Q34,45 30,55 Z" fill="${c.bg}" stroke="${fc}" stroke-width="1.5"/>
<path d="M40,49 L44,61" stroke="${fc}" stroke-width="1.8" fill="none"/>
<path d="M52,52 L50,64" stroke="${fc}" stroke-width="1.8" fill="none"/>
<path d="M64,58 L59,64" stroke="${fc}" stroke-width="1.8" fill="none"/>
<circle cx="38" cy="65" r="9" fill="white"/><circle cx="62" cy="65" r="9" fill="white"/>
<circle cx="38" cy="66" r="6.5" fill="#2A1A2A"/><circle cx="62" cy="66" r="6.5" fill="#2A1A2A"/>
<circle cx="40" cy="63.5" r="2.5" fill="white"/><circle cx="64" cy="63.5" r="2.5" fill="white"/>
<path d="M33,57 Q38,52 44,57" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M56,57 Q61,52 67,57" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="78" cy="73" r="8" fill="${c.from}" stroke="${fc}" stroke-width="1.5"/>
<circle cx="74" cy="64" r="4" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
<circle cx="82" cy="64" r="4" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
<circle cx="68" cy="68" r="3.5" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
</svg>`;
  }

  function getEggType(username) {
    return Array.from(username).reduce((s,c)=>s+c.charCodeAt(0),0) % 8;
  }
  function getEggInfo(lifetime_minutes) {
    const h = lifetime_minutes;
    let stage, progress, nextMins;
    if (h >= THRESHOLDS[3]) { stage=3; progress=100; nextMins=0; }
    else if (h >= THRESHOLDS[2]) { stage=2; progress=(h-THRESHOLDS[2])/(THRESHOLDS[3]-THRESHOLDS[2])*100; nextMins=THRESHOLDS[3]-h; }
    else if (h >= THRESHOLDS[1]) { stage=1; progress=(h-THRESHOLDS[1])/(THRESHOLDS[2]-THRESHOLDS[1])*100; nextMins=THRESHOLDS[2]-h; }
    else { stage=0; progress=h/THRESHOLDS[1]*100; nextMins=THRESHOLDS[1]-h; }
    return { stage, progress: Math.min(progress,100), nextMins };
  }
  function renderEgg(username, lifetime_minutes) {
    const type = getEggType(username);
    const { stage, progress } = getEggInfo(lifetime_minutes);
    const c = EGG_COLORS[type];
    const illust = stage === 3 ? ANIMAL_SVGS[type] : getEggStageSVG(stage, c);
    const r = 22, circ = 2*Math.PI*r;
    const dashoffset = circ*(1-progress/100);
    const animalClass = stage === 3 ? ' animal' : '';
    const bg = stage === 3 ? 'linear-gradient(135deg,#f8f8ff,#fff)' : `linear-gradient(135deg,${c.bg},${c.from})`;
    return `<div class="egg-widget">
      <svg width="56" height="56" viewBox="0 0 56 56" style="position:absolute;top:0;left:0">
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="3.5"/>
        <circle cx="28" cy="28" r="${r}" fill="none" stroke="${c.ring}" stroke-width="3.5"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dashoffset.toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 28 28)" style="transition:stroke-dashoffset 0.8s ease"/>
      </svg>
      <div class="egg-inner${animalClass}" style="background:${bg}">
        <div class="egg-illust${stage===3?' hatched':''}" style="width:36px;height:36px">${illust}</div>
      </div>
    </div>`;
  }

  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const myUsername = localStorage.getItem('username');
  document.getElementById('myName').textContent = myUsername;
  document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
  let currentPeriod = 'daily';
  function logout() { localStorage.clear(); location.href = '/'; }
  function authHeaders() { return { 'Authorization': 'Bearer ' + token }; }
  function setPeriod(p, el) {
    currentPeriod = p;
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    loadStats();
  }
  async function loadStats() {
    const d = document.getElementById('dateInput').value;
    const res = await fetch('/api/stats?target_date=' + d + '&period=' + currentPeriod, { headers: authHeaders() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (data.length > 0) {
      const { period, start_date, end_date } = data[0];
      if (period === 'weekly') document.getElementById('periodLabel').textContent = start_date + ' (월) ~ ' + end_date + ' (일) 주간 누적';
      else if (period === 'monthly') document.getElementById('periodLabel').textContent = start_date.slice(0,7) + ' 월간 누적';
      else document.getElementById('periodLabel').textContent = '';
    } else { document.getElementById('periodLabel').textContent = ''; }
    const board = document.getElementById('board');
    if (!data.length) { board.innerHTML = '<div class="empty">🥚 아직 기록이 없어요!</div>'; return; }
    const max = data[0].active_minutes;
    board.innerHTML = data.map((u, i) => {
      const rate = Math.min(u.achievement_rate, 100);
      const goalColor = u.achievement_rate >= 100 ? '#6bcb77' : u.achievement_rate >= 50 ? '#74b9ff' : '#ddd0ee';
      const isMe = u.username === myUsername;
      let rankClass = 'rank-other', cardClass = '', barClass = 'bar';
      if (i === 0) { rankClass = 'rank-1'; cardClass = 'card-rank-1'; barClass = 'bar bar-gold'; }
      else if (i === 1) { rankClass = 'rank-2'; cardClass = 'card-rank-2'; }
      else if (i === 2) { rankClass = 'rank-3'; cardClass = 'card-rank-3'; }
      if (isMe) cardClass += ' card-me';
      const w = max > 0 ? (u.active_minutes / max * 100) : 0;
      const lt = u.lifetime_minutes || 0;
      const { stage } = getEggInfo(lt);
      const eggLabel = stage===3 ? ANIMAL_NAMES[getEggType(u.username)] : STAGE_LABELS[stage];
      return '<div class="card ' + cardClass + '" style="animation-delay:' + (i * 0.06) + 's">'
        + '<div class="rank-badge ' + rankClass + '">' + (i === 0 ? '👑' : i+1) + '</div>'
        + renderEgg(u.username, lt)
        + '<div class="info"><div class="name">' + u.username + (isMe ? '<span class="me-tag">ME</span>' : '') + '</div>'
        + '<div class="time">오늘 ' + u.active_minutes + '분</div>'
        + '<div class="egg-label">' + eggLabel + '</div></div>'
        + '<div class="bar-col"><div class="bar-wrap"><div class="' + barClass + '" style="width:' + w + '%"></div></div>'
        + '<div class="goal-row"><div class="goal-bar-wrap"><div class="goal-bar" style="width:' + rate + '%;background:' + goalColor + '"></div></div>'
        + '<span class="goal-text">목표 ' + u.achievement_rate + '%</span></div></div></div>';
    }).join('');
    document.getElementById('updatedAt').textContent = '업데이트 ' + new Date().toLocaleTimeString('ko-KR');
  }
  async function loadLive() {
    try {
      const res = await fetch('/api/attendance/live', { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      const list = document.getElementById('liveList');
      if (!data.length) { list.innerHTML = '<span class="chip-none">아직 출근한 멤버가 없어요 🌙</span>'; return; }
      list.innerHTML = data.map(u => {
        const cls = u.is_absent ? 'chip-absent' : 'chip-present';
        const icon = u.is_absent ? '🚶' : '📚';
        const label = u.is_absent ? u.username + ' 외출중' : u.username + ' ' + u.checkin_at + '~';
        return '<span class="live-chip ' + cls + '">' + icon + ' ' + label + '</span>';
      }).join('');
    } catch {}
  }
  fetch('/client/version').then(r => r.json()).then(d => {
    const btn = document.getElementById('downloadBtn');
    btn.textContent = '⬇ 클라이언트' + (d.version && d.version !== '0.0.0' ? ' v' + d.version : '');
    btn.style.display = 'inline-block';
  }).catch(() => {});
  loadStats(); loadLive();
  setInterval(loadStats, 30000); setInterval(loadLive, 30000);
</script>
</body>
</html>
