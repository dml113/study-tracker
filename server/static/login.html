<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공부 트래커 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/design/colors_and_type.css">
<link rel="stylesheet" href="/static/design/components.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--st-font); background: var(--st-bg); color: var(--st-fg1); min-height: 100vh; }
.error { display: none; }
.error.show { display: block; }
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="login-wrap">
  <div class="floaties">
    <span class="floaty">🥚</span>
    <span class="floaty">⭐</span>
    <span class="floaty">🌸</span>
    <span class="floaty">✨</span>
    <span class="floaty">🐣</span>
  </div>
  <div class="login-card">
    <div class="logo-area">
      <span class="logo-icon">🌸</span>
      <div class="logo-title">공부 트래커</div>
      <div class="logo-sub">동아리 공부 랭킹 시스템</div>
      <div class="season-badge">SEASON 1</div>
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">로그인</div>
      <div class="divider-line"></div>
    </div>
    <div class="error" id="error"></div>
    <div class="field-wrap">
      <label class="field-label">아이디</label>
      <input type="text" id="username" placeholder="아이디 입력" autofocus>
    </div>
    <div class="field-wrap">
      <label class="field-label">비밀번호</label>
      <input type="password" id="password" placeholder="비밀번호 입력">
    </div>
    <button class="btn-login" onclick="login()">입장하기 🚀</button>
    <div class="animals-row">🐱 🐶 🐹 🐰 🐸 🦊 🐼 🐨</div>
    <div class="privacy-notice">
      <b>📋 수집 정보 안내</b><br>
      본 시스템은 동아리 학습 통계 제공을 위해 다음을 측정합니다:<br>
      • 출퇴근/외출 시각, 누적 활동 시간<br>
      • 키보드·마우스 <b>활성 여부</b> (입력 내용은 수집하지 않음)<br>
      • VMware 창의 화면 변화 감지 (이미지 저장하지 않음)<br>
      수집된 정보는 본인 통계 및 동아리 운영 목적으로 사용되며,
      <b>아이디·공부시간·랭킹·출석 현황은 동아리 부원에게 공개</b>됩니다.
    </div>
  </div>
</div>
<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error');
    errEl.classList.remove('show');
    if (!username || !password) { showError('아이디와 비밀번호를 입력하세요'); return; }
    const form = new URLSearchParams();
    form.append('username', username); form.append('password', password);
    try {
      const res = await fetch('/auth/login', { method:'POST', body:form });
      const data = await res.json();
      if (!res.ok) { showError(data.detail || '로그인 실패'); return; }
      localStorage.setItem('token', data.access_token);
      location.href = ['superadmin','group_admin'].includes(data.role) ? '/admin' : '/dashboard';
    } catch(e) { showError('서버 연결에 실패했습니다'); }
  }
  function showError(msg) { const el = document.getElementById('error'); el.textContent = msg; el.classList.add('show'); }
  function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return {}; } }
  const token = localStorage.getItem('token');
  if (token) { const {role} = parseJwt(token); location.href = ['superadmin','group_admin'].includes(role) ? '/admin' : '/dashboard'; }
</script>
</body>
</html>
