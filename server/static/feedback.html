<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피드백 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/design/colors_and_type.css">
<link rel="stylesheet" href="/static/design/components.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--st-font); background: var(--st-bg); color: var(--st-fg1); min-height: 100vh; }
.container { max-width: 680px; }
.page-header { margin-bottom: 24px; }
.page-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 6px; }
.page-sub { font-size: 0.9rem; color: var(--st-fg2); font-weight: 600; }

.info-row { display:flex; gap:10px; align-items:flex-start; background: rgba(116,185,255,0.08); border: 1.5px solid rgba(116,185,255,0.2); border-radius: var(--st-r-md); padding: 12px 16px; margin-bottom: 20px; }
.info-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
.info-text { font-size: 0.82rem; font-weight: 600; color: var(--st-blue); line-height: 1.5; }

.category-row { display:flex; gap:8px; margin-bottom: 18px; flex-wrap: wrap; }
.pill-tab.active-bug { background: rgba(224,80,80,0.12); color: var(--st-error); box-shadow: none; }
.pill-tab.active-suggestion { background: rgba(116,185,255,0.14); color: var(--st-blue); box-shadow: none; }
.pill-tab.active-general { background: var(--st-grad-primary); color:#fff; box-shadow: var(--st-shadow-cta); }

textarea { min-height: 130px; resize: vertical; line-height: 1.6; }
.char-count { font-size: 0.72rem; font-weight: 600; color: var(--st-fg3); text-align: right; margin-top: 4px; }
.submit-btn { margin-top: 8px; }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.success-card { background: rgba(107,203,119,0.08); border: 1.5px solid rgba(107,203,119,0.3); border-radius: var(--st-r-xl); padding: 28px; text-align: center; display: none; }
.success-icon { font-size: 2.5rem; margin-bottom: 8px; }
.success-title { font-size: 1.2rem; font-weight: 900; color: var(--st-mint); margin-bottom: 6px; }
.success-sub { font-size: 0.88rem; color: var(--st-mint); opacity: 0.85; font-weight: 600; }
.back-link { display: inline-block; margin-top: 16px; padding: 9px 22px; background: var(--st-surface); border: 1.5px solid rgba(107,203,119,0.3); border-radius: var(--st-r-pill); font-size: 0.85rem; font-weight: 700; color: var(--st-mint); text-decoration: none; }

.my-feedbacks-section { margin-top: 24px; }
.feedback-item { background: var(--st-surface); border: 1.5px solid var(--st-border); border-radius: var(--st-r-xl); padding: 16px 18px; margin-bottom: 10px; box-shadow: var(--st-shadow-card); }
.feedback-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.feedback-cat { font-size: 0.72rem; font-weight: 800; padding: 3px 10px; border-radius: var(--st-r-pill); }
.cat-bug { background: rgba(224,80,80,0.12); color: var(--st-error); }
.cat-suggestion { background: rgba(116,185,255,0.14); color: var(--st-blue); }
.cat-general { background: rgba(255,143,171,0.14); color: var(--st-primary); }
.feedback-title { font-size: 0.95rem; font-weight: 800; flex: 1; }
.feedback-status { font-size: 0.72rem; font-weight: 800; padding: 3px 10px; border-radius: var(--st-r-pill); }
.status-resolved { background: rgba(107,203,119,0.14); color: var(--st-mint); }
.status-pending { background: var(--st-surface-alt); color: var(--st-fg3); }
.feedback-body { font-size: 0.85rem; font-weight: 600; color: var(--st-fg2); line-height: 1.6; margin-bottom: 8px; white-space: pre-wrap; }
.feedback-comment { background: rgba(107,203,119,0.07); border: 1.5px solid rgba(107,203,119,0.25); border-radius: var(--st-r-md); padding: 10px 14px; font-size: 0.82rem; font-weight: 700; color: var(--st-mint); line-height: 1.5; margin-top: 6px; }
.feedback-comment-label { font-size: 0.68rem; font-weight: 800; opacity: 0.8; margin-bottom: 3px; }
.feedback-date { font-size: 0.72rem; font-weight: 600; color: var(--st-fg3); margin-top: 6px; }
.no-feedback { text-align: center; color: var(--st-fg3); font-size: 0.88rem; font-weight: 600; padding: 28px 0; }
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header class="app-header">
  <div class="logo">🌸 공부 트래커</div>
  <div class="right">
    <span class="tag" id="myName"></span>
    <a id="backBtn" href="/dashboard" class="nav-btn">← 대시보드</a>
    <button class="nav-btn" onclick="logout()">로그아웃</button>
  </div>
</header>

<div class="container">
  <div class="page-header">
    <div class="page-title">💬 피드백 보내기</div>
    <div class="page-sub">버그 신고, 기능 제안, 기타 의견을 자유롭게 남겨주세요</div>
  </div>

  <div class="st-card" id="formCard" style="padding:24px">
    <div class="info-row">
      <span class="info-icon">💡</span>
      <span class="info-text">피드백은 관리자에게만 공개됩니다. 솔직하게 작성해주세요!</span>
    </div>

    <div class="category-row">
      <button class="pill-tab active-bug" onclick="setCategory('bug', this)" id="catBug">🐛 버그 신고</button>
      <button class="pill-tab" onclick="setCategory('suggestion', this)" id="catSuggestion">✨ 기능 제안</button>
      <button class="pill-tab" onclick="setCategory('general', this)" id="catGeneral">💬 기타 의견</button>
    </div>

    <div class="field-wrap">
      <label class="field-label">제목</label>
      <input type="text" id="feedbackTitle" placeholder="피드백 제목을 간단히 입력해주세요" maxlength="100">
    </div>
    <div class="field-wrap">
      <label class="field-label">내용</label>
      <textarea id="feedbackBody" placeholder="자세한 내용을 입력해주세요 (버그의 경우 재현 방법을 적어주시면 큰 도움이 됩니다)" maxlength="2000" oninput="updateCount(this, 'bodyCount', 2000)"></textarea>
      <div class="char-count"><span id="bodyCount">0</span> / 2000</div>
    </div>
    <button class="btn-login submit-btn" id="submitBtn" onclick="submitFeedback()">피드백 제출하기 🚀</button>
  </div>

  <div class="success-card" id="successCard">
    <div class="success-icon">🎉</div>
    <div class="success-title">피드백이 전달되었어요!</div>
    <div class="success-sub">소중한 의견 감사합니다. 더 좋은 트래커를 만들겠습니다 🌸</div>
    <a id="backLink" href="/dashboard" class="back-link">대시보드로 돌아가기</a>
  </div>

  <div class="my-feedbacks-section" id="myFeedbacksSection" style="display:none">
    <div class="section-title">📬 내가 보낸 피드백</div>
    <div id="myFeedbacksList"></div>
  </div>
</div>
<script>
  function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch { return {}; } }
  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const {sub: myUsername, role: myRole} = parseJwt(token);
  document.getElementById('myName').textContent = myUsername;
  if (['superadmin', 'group_admin'].includes(myRole)) {
    document.getElementById('backBtn').href = '/admin';
    document.getElementById('backBtn').textContent = '← 관리자 페이지';
    document.getElementById('backLink').href = '/admin';
    document.getElementById('backLink').textContent = '관리자 페이지로 돌아가기';
  }
  function logout() { localStorage.clear(); location.href = '/'; }
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function loadMyFeedbacks() {
    try {
      const res = await fetch('/api/my-feedbacks', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) return;
      const data = await res.json();
      const section = document.getElementById('myFeedbacksSection');
      const list = document.getElementById('myFeedbacksList');
      if (!data.length) {
        list.innerHTML = '<div class="no-feedback">아직 제출한 피드백이 없어요</div>';
      } else {
        list.innerHTML = data.map(f => {
          const catClass = 'cat-' + esc(f.category);
          const statusHtml = f.is_resolved
            ? '<span class="feedback-status status-resolved">✅ 처리완료</span>'
            : '<span class="feedback-status status-pending">⏳ 검토중</span>';
          const commentHtml = f.is_resolved && f.admin_comment
            ? `<div class="feedback-comment"><div class="feedback-comment-label">관리자 코멘트</div>${esc(f.admin_comment)}</div>` : '';
          return `<div class="feedback-item">
            <div class="feedback-item-header">
              <span class="feedback-cat ${catClass}">${esc(f.category_label)}</span>
              <span class="feedback-title">${esc(f.title)}</span>
              ${statusHtml}
            </div>
            <div class="feedback-body">${esc(f.body)}</div>
            ${commentHtml}
            <div class="feedback-date">${esc(f.created_at)}</div>
          </div>`;
        }).join('');
      }
      section.style.display = 'block';
    } catch {}
  }

  loadMyFeedbacks();

  let currentCategory = 'bug';
  function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.category-row .pill-tab').forEach(b => b.className = 'pill-tab');
    el.className = 'pill-tab active-' + cat;
  }
  function updateCount(el, countId, max) {
    document.getElementById(countId).textContent = el.value.length;
  }
  async function submitFeedback() {
    const title = document.getElementById('feedbackTitle').value.trim();
    const body = document.getElementById('feedbackBody').value.trim();
    if (!title) { alert('제목을 입력해주세요'); return; }
    if (!body) { alert('내용을 입력해주세요'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '전송 중...';
    try {
      const res = await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ category: currentCategory, title, body }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.detail || '전송 실패'); btn.disabled = false; btn.textContent = '피드백 제출하기 🚀'; return; }
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
    } catch {
      alert('서버 연결에 실패했습니다');
      btn.disabled = false;
      btn.textContent = '피드백 제출하기 🚀';
    }
  }
</script>
</body>
</html>
