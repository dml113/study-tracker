<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 통계 - 공부 트래커</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: #1e293b; padding: 16px 32px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: #60a5fa; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-back { background: none; border: 1px solid #475569; color: #94a3b8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
  .btn-back:hover { border-color: #64748b; color: #e2e8f0; }
  .container { max-width: 900px; margin: 32px auto; padding: 0 24px; }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .summary-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px 20px; }
  .summary-label { font-size: 0.78rem; color: #94a3b8; margin-bottom: 6px; }
  .summary-value { font-size: 1.6rem; font-weight: 800; color: #e2e8f0; }
  .summary-sub { font-size: 0.78rem; color: #475569; margin-top: 4px; }
  .section { margin-bottom: 28px; }
  .section-title { font-size: 0.88rem; color: #94a3b8; font-weight: 600; margin-bottom: 14px; }
  .weekly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .week-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px 16px; }
  .week-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; }
  .week-value { font-size: 1.1rem; font-weight: 700; color: #60a5fa; }
  .week-sub { font-size: 0.75rem; color: #475569; margin-top: 3px; }
  .goal-bar-wrap { background: #0f172a; border-radius: 99px; height: 5px; margin-top: 8px; overflow: hidden; }
  .goal-bar { height: 100%; border-radius: 99px; }
  .daily-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; }
  .day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: default; position: relative; }
  .day-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: opacity 0.2s; }
  .day-bar:hover { opacity: 0.8; }
  .day-label { font-size: 0.6rem; color: #475569; white-space: nowrap; }
  .tooltip { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 5px 9px; font-size: 0.75rem; white-space: nowrap; pointer-events: none; display: none; z-index: 10; }
  .day-col:hover .tooltip { display: block; }
  .period-selector { display: flex; gap: 8px; margin-bottom: 16px; }
  .period-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
  .period-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; font-weight: 600; }
  @media (max-width: 600px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .weekly-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="header">
  <h1>내 통계</h1>
  <div class="header-right">
    <span id="myName" style="color:#94a3b8;font-size:0.9rem"></span>
    <a href="/dashboard" class="btn-back">← 대시보드</a>
  </div>
</div>
<div class="container">
  <div class="period-selector">
    <button class="period-btn active" onclick="loadStats(30, this)">30일</button>
    <button class="period-btn" onclick="loadStats(60, this)">60일</button>
    <button class="period-btn" onclick="loadStats(90, this)">90일</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">총 활동 시간</div>
      <div class="summary-value" id="totalHours">–</div>
      <div class="summary-sub" id="totalMinutes"></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">출석일</div>
      <div class="summary-value" id="attendDays">–</div>
      <div class="summary-sub" id="attendRate"></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">현재 연속</div>
      <div class="summary-value" id="currentStreak">–</div>
      <div class="summary-sub">일 연속 공부 중</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">최대 연속</div>
      <div class="summary-value" id="maxStreak">–</div>
      <div class="summary-sub" id="maxStreakSub">일</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">일별 활동 (최근 <span id="periodLabel">30</span>일)</div>
    <div class="daily-chart" id="dailyChart"></div>
  </div>

  <div class="section">
    <div class="section-title">주간 요약 (최근 4주)</div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </div>
</div>
<script>
  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const myUsername = localStorage.getItem('username');
  document.getElementById('myName').textContent = myUsername;

  function authH() { return { 'Authorization': 'Bearer ' + token }; }

  async function loadStats(days, btn) {
    if (btn) {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    document.getElementById('periodLabel').textContent = days;

    const res = await fetch(`/api/my-stats?days=${days}`, { headers: authH() });
    if (res.status === 401) { localStorage.clear(); location.href = '/'; return; }
    const d = await res.json();

    const totalMins = d.total_minutes;
    const totalH = Math.floor(totalMins / 60);
    const totalM = Math.round(totalMins % 60);
    document.getElementById('totalHours').textContent = totalH + 'h ' + totalM + 'm';
    document.getElementById('totalMinutes').textContent = totalMins + '분 총합';
    document.getElementById('attendDays').textContent = d.attend_days + '일';
    document.getElementById('attendRate').textContent = `전체 ${days}일 중 ${Math.round(d.attend_days / days * 100)}%`;
    document.getElementById('currentStreak').textContent = d.current_streak;
    document.getElementById('maxStreak').textContent = d.max_streak;

    // 일별 차트
    const chart = document.getElementById('dailyChart');
    const maxSecs = Math.max(...d.daily.map(x => x.active_seconds), 1);
    const goal = d.daily_goal_minutes * 60;
    chart.innerHTML = d.daily.map(item => {
      const pct = Math.max(item.active_seconds / maxSecs * 100, item.active_seconds > 0 ? 3 : 0);
      const goalPct = Math.min(item.active_seconds / goal * 100, 100);
      const color = goalPct >= 100 ? '#22c55e' : goalPct >= 50 ? '#3b82f6' : item.active_seconds > 0 ? '#475569' : '#1e293b';
      const dateShort = item.date.slice(5);
      const dayOfWeek = ['일','월','화','수','목','금','토'][new Date(item.date).getDay()];
      return `
        <div class="day-col">
          <div class="tooltip">${item.date}<br>${item.active_minutes}분 (목표 ${Math.round(goalPct)}%)</div>
          <div class="day-bar" style="height:${pct}%;background:${color}"></div>
          <div class="day-label">${dateShort.slice(3)}</div>
        </div>`;
    }).join('');

    // 주간 요약
    const weekGrid = document.getElementById('weeklyGrid');
    weekGrid.innerHTML = d.weekly.map((w, i) => {
      const label = i === 0 ? '이번 주' : `${i}주 전`;
      const goalWeek = d.daily_goal_minutes * 7;
      const rate = Math.min(Math.round(w.active_minutes / goalWeek * 100), 100);
      const color = rate >= 100 ? '#22c55e' : rate >= 50 ? '#3b82f6' : '#475569';
      return `
        <div class="week-card">
          <div class="week-label">${label} (${w.start.slice(5)}~${w.end.slice(5)})</div>
          <div class="week-value">${w.active_minutes}분</div>
          <div class="week-sub">${Math.floor(w.active_minutes/60)}h ${Math.round(w.active_minutes%60)}m · 목표 ${rate}%</div>
          <div class="goal-bar-wrap"><div class="goal-bar" style="width:${rate}%;background:${color}"></div></div>
        </div>`;
    }).join('');
  }

  loadStats(30);
</script>
</body>
</html>
