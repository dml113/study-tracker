<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 통계 - 공부 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #06080f; --surface: rgba(255,255,255,0.025); --border: rgba(255,255,255,0.07);
  --cyan: #00d4ff; --green: #10b981; --text: #e2e8f0; --muted: #4a5568; --muted-light: #64748b;
}
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px); background-size: 52px 52px; z-index: 0; pointer-events: none; }
.orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(100px); animation: drift 28s ease-in-out infinite; }
.orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(0,60,200,0.1), transparent 70%); top: -250px; left: -150px; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(16,185,129,0.07), transparent 70%); bottom: -150px; right: -100px; animation-delay: -12s; }
@keyframes drift { 0%,100% { transform:translate(0,0); } 50% { transform:translate(25px,-20px); } }
.header { position: relative; z-index: 10; background: rgba(6,8,15,0.85); backdrop-filter: blur(20px); padding: 0 36px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 62px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 4px; background: linear-gradient(135deg,#00d4ff,#0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-right { display: flex; align-items: center; gap: 14px; }
.username-tag { font-size: 0.82rem; color: var(--muted-light); font-family: 'JetBrains Mono', monospace; }
.nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted-light); padding: 7px 15px; border-radius: 10px; font-size: 0.82rem; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; text-decoration: none; transition: border-color 0.2s, color 0.2s; }
.nav-btn:hover { border-color: rgba(0,212,255,0.3); color: var(--cyan); }
.container { position: relative; z-index: 1; max-width: 900px; margin: 36px auto; padding: 0 24px; }
.period-selector { display: flex; gap: 6px; margin-bottom: 28px; }
.period-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted-light); padding: 8px 20px; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
.period-btn.active { background: linear-gradient(135deg,#0057ff,#00d4ff); border-color: transparent; color: white; box-shadow: 0 2px 14px rgba(0,100,255,0.3); }
.summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 32px; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px 20px; position: relative; overflow: hidden; animation: fadeUp 0.5s ease both; }
.summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg,#0057ff,#00d4ff); opacity: 0.6; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.summary-card:nth-child(1){animation-delay:0.05s} .summary-card:nth-child(2){animation-delay:0.1s} .summary-card:nth-child(3){animation-delay:0.15s} .summary-card:nth-child(4){animation-delay:0.2s}
.summary-label { font-size: 0.7rem; color: var(--muted-light); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
.summary-value { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; line-height: 1; }
.summary-sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }
.section { margin-bottom: 32px; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.section-title { font-size: 0.72rem; color: var(--muted-light); font-weight: 600; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
.section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(0,212,255,0.2), transparent); }
.chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px 16px; position: relative; }
.chart-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg,transparent,rgba(0,212,255,0.15),transparent); }
.daily-chart { display: flex; align-items: flex-end; gap: 3px; height: 120px; }
.day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: default; position: relative; }
.day-bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 2px; transition: opacity 0.2s; }
.day-bar:hover { opacity: 0.75; }
.day-label { font-size: 0.58rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.tip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #0f1320; border: 1px solid rgba(0,212,255,0.2); border-radius: 8px; padding: 7px 11px; font-size: 0.72rem; white-space: nowrap; pointer-events: none; display: none; z-index: 10; font-family: 'JetBrains Mono', monospace; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.day-col:hover .tip { display: block; }
.weekly-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
.week-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; transition: border-color 0.2s; }
.week-card:hover { border-color: rgba(0,212,255,0.2); }
.week-label { font-size: 0.7rem; color: var(--muted-light); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.week-date { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }
.week-value { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; color: var(--cyan); line-height: 1; }
.week-sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.goal-bar-wrap { background: rgba(255,255,255,0.04); border-radius: 99px; height: 4px; margin-top: 10px; overflow: hidden; }
.goal-bar { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
@media (max-width:640px) { .summary-grid { grid-template-columns: repeat(2,1fr); } .weekly-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="header">
  <div class="logo">내 통계</div>
  <div class="header-right">
    <span class="username-tag" id="myName"></span>
    <a href="/dashboard" class="nav-btn">← 대시보드</a>
  </div>
</div>
<div class="container">
  <div class="period-selector">
    <button class="period-btn active" onclick="loadStats(30, this)">30일</button>
    <button class="period-btn" onclick="loadStats(60, this)">60일</button>
    <button class="period-btn" onclick="loadStats(90, this)">90일</button>
  </div>
  <div class="summary-grid">
    <div class="summary-card"><div class="summary-label">총 활동 시간</div><div class="summary-value" id="totalHours">–</div><div class="summary-sub" id="totalMinutes"></div></div>
    <div class="summary-card"><div class="summary-label">출석일</div><div class="summary-value" id="attendDays">–</div><div class="summary-sub" id="attendRate"></div></div>
    <div class="summary-card"><div class="summary-label">현재 연속</div><div class="summary-value" id="currentStreak">–</div><div class="summary-sub">일 연속</div></div>
    <div class="summary-card"><div class="summary-label">최대 연속</div><div class="summary-value" id="maxStreak">–</div><div class="summary-sub">일 최고 기록</div></div>
  </div>
  <div class="section">
    <div class="section-header"><span class="section-title">일별 활동 — 최근 <span id="periodLabel">30</span>일</span><div class="section-line"></div></div>
    <div class="chart-container"><div class="daily-chart" id="dailyChart"></div></div>
  </div>
  <div class="section">
    <div class="section-header"><span class="section-title">주간 요약 — 최근 4주</span><div class="section-line"></div></div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </div>
</div>
<script>
  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const myUsername = localStorage.getItem('username');
  document.getElementById('myName').textContent = myUsername;
  function authH() { return { 'Authorization': 'Bearer ' + token }; }
  async function loadStats(days, btn) {
    if (btn) { document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); }
    document.getElementById('periodLabel').textContent = days;
    const res = await fetch('/api/my-stats?days=' + days, { headers: authH() });
    if (res.status === 401) { localStorage.clear(); location.href = '/'; return; }
    const d = await res.json();
    const totalMins = d.total_minutes;
    document.getElementById('totalHours').textContent = Math.floor(totalMins/60) + 'h ' + Math.round(totalMins%60) + 'm';
    document.getElementById('totalMinutes').textContent = totalMins + '분 총합';
    document.getElementById('attendDays').textContent = d.attend_days + '일';
    document.getElementById('attendRate').textContent = '전체 ' + days + '일 중 ' + Math.round(d.attend_days/days*100) + '%';
    document.getElementById('currentStreak').textContent = d.current_streak;
    document.getElementById('maxStreak').textContent = d.max_streak;
    const chart = document.getElementById('dailyChart');
    const maxSecs = Math.max.apply(null, d.daily.map(function(x){return x.active_seconds;}).concat([1]));
    const goal = d.daily_goal_minutes * 60;
    chart.innerHTML = d.daily.map(function(item) {
      const pct = Math.max(item.active_seconds/maxSecs*100, item.active_seconds>0?4:0);
      const gp = Math.min(item.active_seconds/goal*100,100);
      const color = gp>=100?'linear-gradient(180deg,#10b981,#059669)':gp>=50?'linear-gradient(180deg,#00d4ff,#0057ff)':item.active_seconds>0?'linear-gradient(180deg,#475569,#334155)':'#1a2035';
      return '<div class="day-col"><div class="tip">' + item.date + '\n' + item.active_minutes + '분 · 목표 ' + Math.round(gp) + '%</div>'
        + '<div class="day-bar" style="height:' + pct + '%;background:' + color + '"></div>'
        + '<div class="day-label">' + item.date.slice(8) + '</div></div>';
    }).join('');
    const weekGrid = document.getElementById('weeklyGrid');
    weekGrid.innerHTML = d.weekly.map(function(w, i) {
      const label = i===0?'이번 주':i+'주 전';
      const gw = d.daily_goal_minutes*7;
      const rate = Math.min(Math.round(w.active_minutes/gw*100),100);
      const color = rate>=100?'#10b981':rate>=50?'#00d4ff':'#334155';
      return '<div class="week-card"><div class="week-label">' + label + '</div>'
        + '<div class="week-date">' + w.start.slice(5) + ' ~ ' + w.end.slice(5) + '</div>'
        + '<div class="week-value">' + w.active_minutes + '분</div>'
        + '<div class="week-sub">' + Math.floor(w.active_minutes/60) + 'h ' + Math.round(w.active_minutes%60) + 'm · 목표 ' + rate + '%</div>'
        + '<div class="goal-bar-wrap"><div class="goal-bar" style="width:' + rate + '%;background:' + color + '"></div></div></div>';
    }).join('');
  }
  loadStats(30);
</script>
</body>
</html>
