<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 통계 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fdf6f0; --surface:#fff; --primary:#ff8fab;
  --text:#3d2b56; --text-light:#7b6b8d; --muted:#c4b5d5;
  --border:rgba(200,180,220,0.3); --shadow:0 4px 20px rgba(180,120,200,0.1);
  --mint:#6bcb77; --blue:#74b9ff;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(200,180,220,0.15) 1px,transparent 1px); background-size:22px 22px; z-index:0; }
.blob { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; animation:blobFloat 18s ease-in-out infinite; }
.blob-1 { width:500px; height:500px; background:rgba(255,143,171,0.1); top:-200px; left:-150px; }
.blob-2 { width:400px; height:400px; background:rgba(168,216,234,0.09); bottom:-150px; right:-120px; animation-delay:-9s; }
@keyframes blobFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-15px)} }
.header { position:relative; z-index:10; background:rgba(255,255,255,0.88); backdrop-filter:blur(20px); border-bottom:1.5px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:1.2rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-right { display:flex; align-items:center; gap:10px; }
.username-tag { font-size:0.82rem; font-weight:700; color:var(--text-light); }
.nav-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--text-light); padding:7px 16px; border-radius:99px; font-size:0.82rem; font-family:'Nunito',sans-serif; font-weight:700; text-decoration:none; cursor:pointer; transition:all 0.2s; }
.nav-btn:hover { border-color:var(--primary); color:var(--primary); }

.container { position:relative; z-index:1; max-width:860px; margin:28px auto; padding:0 20px; }

/* Egg hero */
.egg-hero {
  background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
  padding:28px; margin-bottom:24px; display:flex; align-items:center; gap:28px;
  box-shadow:var(--shadow);
}
.egg-hero-visual { position:relative; width:120px; height:120px; flex-shrink:0; }
.egg-big {
  position:absolute; top:14px; left:14px; right:14px; bottom:14px;
  border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.1); overflow:hidden;
}
.egg-big.animal { border-radius:50%; }
.egg-big.hatched { animation:pop 0.6s ease; }
@keyframes pop { 0%{transform:scale(0.6)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.egg-hero-info { flex:1; }
.egg-hero-title { font-size:1.5rem; font-weight:900; margin-bottom:4px; }
.egg-hero-stage { font-size:0.9rem; font-weight:700; color:var(--primary); margin-bottom:12px; }
.egg-progress-wrap { background:rgba(200,180,220,0.15); border-radius:99px; height:10px; overflow:hidden; margin-bottom:6px; }
.egg-progress-bar { height:100%; border-radius:99px; transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
.egg-progress-label { font-size:0.8rem; font-weight:700; color:var(--text-light); }
.egg-next { font-size:0.82rem; font-weight:600; color:var(--muted); margin-top:4px; }

.period-selector { display:flex; gap:5px; margin-bottom:24px; }
.period-btn { background:rgba(200,180,220,0.12); border:1.5px solid var(--border); color:var(--text-light); padding:8px 18px; border-radius:99px; cursor:pointer; font-size:0.85rem; font-weight:700; font-family:'Nunito',sans-serif; transition:all 0.2s; }
.period-btn.active { background:linear-gradient(135deg,var(--primary),#c77dff); border-color:transparent; color:white; box-shadow:0 2px 10px rgba(255,143,171,0.35); }

.summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
.summary-card { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:18px 16px; box-shadow:var(--shadow); animation:fadeUp 0.5s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.summary-card:nth-child(1){animation-delay:0.05s} .summary-card:nth-child(2){animation-delay:0.1s} .summary-card:nth-child(3){animation-delay:0.15s} .summary-card:nth-child(4){animation-delay:0.2s}
.summary-label { font-size:0.7rem; font-weight:800; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.summary-value { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
.summary-sub { font-size:0.72rem; font-weight:600; color:var(--muted); margin-top:5px; }

.section { margin-bottom:28px; }
.section-title { font-size:0.8rem; font-weight:800; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1.5px; background:linear-gradient(90deg,var(--border),transparent); border-radius:99px; }

.chart-container { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:20px 18px 14px; box-shadow:var(--shadow); }
.daily-chart { display:flex; align-items:flex-end; gap:3px; height:120px; }
.day-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:default; position:relative; }
.day-bar { width:100%; border-radius:6px 6px 0 0; min-height:2px; transition:opacity 0.2s; }
.day-bar:hover { opacity:0.75; }
.day-label { font-size:0.58rem; font-weight:700; color:var(--muted); }
.tip { position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:6px 10px; font-size:0.72rem; font-weight:700; white-space:nowrap; pointer-events:none; display:none; z-index:10; box-shadow:0 4px 16px rgba(180,120,200,0.15); }
.day-col:hover .tip { display:block; }

.weekly-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.week-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 14px; box-shadow:var(--shadow); transition:border-color 0.2s, transform 0.2s; }
.week-card:hover { border-color:rgba(255,143,171,0.35); transform:translateY(-2px); }
.week-label { font-size:0.72rem; font-weight:800; color:var(--text-light); margin-bottom:3px; }
.week-date { font-size:0.65rem; font-weight:600; color:var(--muted); margin-bottom:7px; }
.week-value { font-size:1.5rem; font-weight:900; color:var(--primary); line-height:1; }
.week-sub { font-size:0.7rem; font-weight:600; color:var(--muted); margin-top:3px; }
.goal-bar-wrap { background:rgba(200,180,220,0.15); border-radius:99px; height:4px; margin-top:8px; overflow:hidden; }
.goal-bar { height:100%; border-radius:99px; transition:width 0.6s ease; }

@media (max-width:640px) { .summary-grid{grid-template-columns:repeat(2,1fr)} .weekly-grid{grid-template-columns:repeat(2,1fr)} }
</style>
</head>

<div class="blob blob-1"></div><div class="blob blob-2"></div>

    </div>
    <div class="egg-hero-info">

    </div>
  </div>

  <div class="period-selector">

  <div class="summary-grid">

    <div class="summary-card"><div class="summary-label">현재 연속</div><div class="summary-value" id="currentStreak">–</div><div class="summary-sub">일 연속</div></div>
    <div class="summary-card"><div class="summary-label">최대 연속</div><div class="summary-value" id="maxStreak">–</div><div class="summary-sub">일 최고 기록</div></div>
  </div>
  <div class="section">
    <div class="section-title">📅 일별 활동 — 최근 <span id="periodLabel">30</span>일</div>
    <div class="chart-container"><div class="daily-chart" id="dailyChart"></div></div>
  </div>
  <div class="section">
    <div class="section-title">📊 주간 요약 — 최근 4주</div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </div>
</div>

<circle cx="39" cy="54" r="2.2" fill="white"/><circle cx="65" cy="54" r="2.2" fill="white"/>

<circle cx="27" cy="66" r="7" fill="rgba(200,180,230,0.38)"/><circle cx="73" cy="66" r="7" fill="rgba(200,180,230,0.38)"/>
</svg>`
  ];

  function getEggStageSVG(stage, c) {
    const fc = 'rgba(0,0,0,0.38)';
    const bl = 'rgba(255,182,193,0.45)';
    if (stage === 0) return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<ellipse cx="37" cy="51" rx="8" ry="12" fill="rgba(255,255,255,0.28)" transform="rotate(-20 37 51)"/>
<path d="M34,67 Q40,62 46,67" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M54,67 Q60,62 66,67" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<path d="M43,76 Q50,81 57,76" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="33" cy="73" r="5" fill="${bl}"/><circle cx="67" cy="73" r="5" fill="${bl}"/>
<text x="66" y="51" font-family="Arial" font-size="10" fill="${fc}" font-weight="bold">z</text>
<text x="73" y="40" font-family="Arial" font-size="12" fill="${fc}" font-weight="bold" opacity="0.7">z</text>
<text x="81" y="29" font-family="Arial" font-size="14" fill="${fc}" font-weight="bold" opacity="0.45">z</text>
</svg>`;
    if (stage === 1) return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<ellipse cx="37" cy="51" rx="8" ry="12" fill="rgba(255,255,255,0.28)" transform="rotate(-20 37 51)"/>
<path d="M50,26 L47,36 L53,43 L50,50" stroke="${fc}" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M53,30 L57,38" stroke="${fc}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
<circle cx="38" cy="67" r="8" fill="white"/><circle cx="62" cy="67" r="8" fill="white"/>
<circle cx="38" cy="68" r="5.5" fill="#2A1A2A"/><circle cx="62" cy="68" r="5.5" fill="#2A1A2A"/>
<circle cx="40" cy="66" r="2" fill="white"/><circle cx="64" cy="66" r="2" fill="white"/>
<path d="M43,77 Q50,82 57,77" stroke="${fc}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
<circle cx="32" cy="74" r="5" fill="${bl}"/><circle cx="68" cy="74" r="5" fill="${bl}"/>
</svg>`;
    return `<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="50" cy="70" rx="36" ry="44" fill="${c.from}"/>
<path d="M18,56 Q28,35 50,29 Q72,35 82,56 Q70,51 64,58 Q58,45 52,52 Q46,41 40,49 Q34,45 30,55 Z" fill="${c.bg}" stroke="${fc}" stroke-width="1.5"/>
<path d="M40,49 L44,61" stroke="${fc}" stroke-width="1.8" fill="none"/>
<path d="M52,52 L50,64" stroke="${fc}" stroke-width="1.8" fill="none"/>
<path d="M64,58 L59,64" stroke="${fc}" stroke-width="1.8" fill="none"/>
<circle cx="38" cy="65" r="9" fill="white"/><circle cx="62" cy="65" r="9" fill="white"/>
<circle cx="38" cy="66" r="6.5" fill="#2A1A2A"/><circle cx="62" cy="66" r="6.5" fill="#2A1A2A"/>
<circle cx="40" cy="63.5" r="2.5" fill="white"/><circle cx="64" cy="63.5" r="2.5" fill="white"/>
<path d="M33,57 Q38,52 44,57" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<path d="M56,57 Q61,52 67,57" stroke="${fc}" stroke-width="2" fill="none" stroke-linecap="round"/>
<circle cx="78" cy="73" r="8" fill="${c.from}" stroke="${fc}" stroke-width="1.5"/>
<circle cx="74" cy="64" r="4" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
<circle cx="82" cy="64" r="4" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
<circle cx="68" cy="68" r="3.5" fill="${c.from}" stroke="${fc}" stroke-width="1.2"/>
</svg>`;
  }

  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const myUsername = localStorage.getItem('username');
  document.getElementById('myName').textContent = myUsername;
  function authH() { return { 'Authorization': 'Bearer ' + token }; }

  function getEggType(username) {
    return Array.from(username).reduce((s,c)=>s+c.charCodeAt(0),0) % 8;
  }
  function getEggInfo(lifetime_minutes) {
    const h = lifetime_minutes;
    let stage, progress, nextMins;
    if (h >= THRESHOLDS[3]) { stage=3; progress=100; nextMins=0; }
    else if (h >= THRESHOLDS[2]) { stage=2; progress=(h-THRESHOLDS[2])/(THRESHOLDS[3]-THRESHOLDS[2])*100; nextMins=THRESHOLDS[3]-h; }
    else if (h >= THRESHOLDS[1]) { stage=1; progress=(h-THRESHOLDS[1])/(THRESHOLDS[2]-THRESHOLDS[1])*100; nextMins=THRESHOLDS[2]-h; }
    else { stage=0; progress=h/THRESHOLDS[1]*100; nextMins=THRESHOLDS[1]-h; }
    return { stage, progress: Math.min(progress,100), nextMins };
  }

  function updateEggHero(lifetime_minutes) {
    const type = getEggType(myUsername);
    const { stage, progress, nextMins } = getEggInfo(lifetime_minutes);
    const c = EGG_COLORS[type];
    const illust = stage === 3 ? ANIMAL_SVGS[type] : getEggStageSVG(stage, c);
    const eggEl = document.getElementById('eggBig');
    eggEl.innerHTML = '<div style="width:76px;height:76px">' + illust + '</div>';
    eggEl.style.background = stage === 3 ? 'linear-gradient(135deg,#f8f8ff,#fff)' : 'linear-gradient(135deg,' + c.bg + ',' + c.from + ')';
    if (stage===3) { eggEl.classList.add('hatched'); eggEl.classList.add('animal'); }
    document.getElementById('eggTitle').textContent = stage===3 ? ANIMAL_NAMES[type] + '!' : '내 알 🥚';
    document.getElementById('eggStageLabel').textContent = STAGE_LABELS[stage];
    const bar = document.getElementById('eggProgressBar');
    bar.style.width = progress + '%';
    bar.style.background = 'linear-gradient(90deg,' + c.ring + ',#c77dff)';
    document.getElementById('eggProgressLabel').textContent = Math.round(progress) + '% 진행';
    document.getElementById('eggRingSvg').style.stroke = c.ring;
    const circ = 2*Math.PI*50;
    document.getElementById('eggRingSvg').style.strokeDasharray = circ.toFixed(1);
    document.getElementById('eggRingSvg').style.strokeDashoffset = (circ*(1-progress/100)).toFixed(1);
    if (stage < 3 && nextMins > 0) {
      const h = Math.floor(nextMins/60), m = Math.round(nextMins%60);
      document.getElementById('eggNext').textContent = '다음 단계까지 ' + (h>0?h+'시간 ':'') + m + '분 더 공부하면!';
    } else if (stage===3) {
      document.getElementById('eggNext').textContent = '완전히 부화했어요! 🎊';
    }
  }

  async function loadStats(days, btn) {
    if (btn) { document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); }
    document.getElementById('periodLabel').textContent = days;
    const res = await fetch('/api/my-stats?days=' + days, { headers: authH() });
    if (res.status === 401) { localStorage.clear(); location.href = '/'; return; }
    const d = await res.json();
    const totalMins = d.total_minutes;
    document.getElementById('totalHours').textContent = Math.floor(totalMins/60) + 'h ' + Math.round(totalMins%60) + 'm';
    document.getElementById('totalMinutes').textContent = totalMins + '분 총합';
    document.getElementById('attendDays').textContent = d.attend_days + '일';
    document.getElementById('attendRate').textContent = '전체 ' + days + '일 중 ' + Math.round(d.attend_days/days*100) + '%';
    document.getElementById('currentStreak').textContent = d.current_streak;
    document.getElementById('maxStreak').textContent = d.max_streak;

    // 평생 누적은 /api/stats에서 가져오기 (별도 요청)
    const statsRes = await fetch('/api/stats?period=daily', { headers: authH() });
    if (statsRes.ok) {
      const statsData = await statsRes.json();
      const myEntry = statsData.find(function(u){return u.username===myUsername;});
      if (myEntry && myEntry.lifetime_minutes !== undefined) {
        updateEggHero(myEntry.lifetime_minutes);
      }
    }

    const chart = document.getElementById('dailyChart');
    const maxSecs = Math.max.apply(null, d.daily.map(function(x){return x.active_seconds;}).concat([1]));
    const goal = d.daily_goal_minutes * 60;
    chart.innerHTML = d.daily.map(function(item) {
      const pct = Math.max(item.active_seconds/maxSecs*100, item.active_seconds>0?4:0);
      const gp = Math.min(item.active_seconds/goal*100,100);
      const color = gp>=100?'linear-gradient(180deg,#6bcb77,#3a9b44)':gp>=50?'linear-gradient(180deg,#ff8fab,#c77dff)':item.active_seconds>0?'linear-gradient(180deg,#ddd0ee,#c4b5d5)':'#f0eaf8';
      return '<div class="day-col"><div class="tip">' + item.date + '\n' + item.active_minutes + '분 · 목표 ' + Math.round(gp) + '%</div>'
        + '<div class="day-bar" style="height:' + pct + '%;background:' + color + '"></div>'
        + '<div class="day-label">' + item.date.slice(8) + '</div></div>';
    }).join('');

    const weekGrid = document.getElementById('weeklyGrid');
    weekGrid.innerHTML = d.weekly.map(function(w, i) {
      const label = i===0?'이번 주':i+'주 전';
      const gw = d.daily_goal_minutes*7;
      const rate = Math.min(Math.round(w.active_minutes/gw*100),100);
      const color = rate>=100?'#6bcb77':rate>=50?'#ff8fab':'#ddd0ee';
      return '<div class="week-card"><div class="week-label">' + label + '</div>'
        + '<div class="week-date">' + w.start.slice(5) + ' ~ ' + w.end.slice(5) + '</div>'
        + '<div class="week-value">' + Math.floor(w.active_minutes/60) + 'h</div>'
        + '<div class="week-sub">' + w.active_minutes + '분 · 목표 ' + rate + '%</div>'
        + '<div class="goal-bar-wrap"><div class="goal-bar" style="width:' + rate + '%;background:' + color + '"></div></div></div>';
    }).join('');
  }
  loadStats(30);
</script>
