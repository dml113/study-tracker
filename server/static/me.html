<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 통계 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#fdf6f0; --surface:#fff; --primary:#ff8fab;
  --text:#3d2b56; --text-light:#7b6b8d; --muted:#c4b5d5;
  --border:rgba(200,180,220,0.3); --shadow:0 4px 20px rgba(180,120,200,0.1);
  --mint:#6bcb77; --blue:#74b9ff;
}
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:radial-gradient(circle,rgba(200,180,220,0.15) 1px,transparent 1px); background-size:22px 22px; z-index:0; }
.blob { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; animation:blobFloat 18s ease-in-out infinite; }
.blob-1 { width:500px; height:500px; background:rgba(255,143,171,0.1); top:-200px; left:-150px; }
.blob-2 { width:400px; height:400px; background:rgba(168,216,234,0.09); bottom:-150px; right:-120px; animation-delay:-9s; }
@keyframes blobFloat { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-15px)} }
.header { position:relative; z-index:10; background:rgba(255,255,255,0.88); backdrop-filter:blur(20px); border-bottom:1.5px solid var(--border); padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:1.2rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-right { display:flex; align-items:center; gap:10px; }
.username-tag { font-size:0.82rem; font-weight:700; color:var(--text-light); }
.nav-btn { background:var(--surface); border:1.5px solid var(--border); color:var(--text-light); padding:7px 16px; border-radius:99px; font-size:0.82rem; font-family:'Nunito',sans-serif; font-weight:700; text-decoration:none; cursor:pointer; transition:all 0.2s; }
.nav-btn:hover { border-color:var(--primary); color:var(--primary); }

.container { position:relative; z-index:1; max-width:860px; margin:28px auto; padding:0 20px; }

/* Egg hero */
.egg-hero {
  background:var(--surface); border:1.5px solid var(--border); border-radius:24px;
  padding:28px; margin-bottom:24px; display:flex; align-items:center; gap:28px;
  box-shadow:var(--shadow);
}
.egg-hero-visual { position:relative; width:120px; height:120px; flex-shrink:0; }
.egg-big {
  position:absolute; top:14px; left:14px; right:14px; bottom:14px;
  border-radius:50% 50% 50% 50% / 58% 58% 42% 42%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.1); overflow:hidden;
}
.egg-big.animal { border-radius:50%; }
.egg-big.hatched { animation:pop 0.6s ease; }
@keyframes pop { 0%{transform:scale(0.6)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.egg-hero-info { flex:1; }
.egg-hero-title { font-size:1.5rem; font-weight:900; margin-bottom:4px; }
.egg-hero-stage { font-size:0.9rem; font-weight:700; color:var(--primary); margin-bottom:12px; }
.egg-progress-wrap { background:rgba(200,180,220,0.15); border-radius:99px; height:10px; overflow:hidden; margin-bottom:6px; }
.egg-progress-bar { height:100%; border-radius:99px; transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1); }
.egg-progress-label { font-size:0.8rem; font-weight:700; color:var(--text-light); }
.egg-next { font-size:0.82rem; font-weight:600; color:var(--muted); margin-top:4px; }

.period-selector { display:flex; gap:5px; margin-bottom:24px; }
.period-btn { background:rgba(200,180,220,0.12); border:1.5px solid var(--border); color:var(--text-light); padding:8px 18px; border-radius:99px; cursor:pointer; font-size:0.85rem; font-weight:700; font-family:'Nunito',sans-serif; transition:all 0.2s; }
.period-btn.active { background:linear-gradient(135deg,var(--primary),#c77dff); border-color:transparent; color:white; box-shadow:0 2px 10px rgba(255,143,171,0.35); }

.summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
.summary-card { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:18px 16px; box-shadow:var(--shadow); animation:fadeUp 0.5s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.summary-card:nth-child(1){animation-delay:0.05s} .summary-card:nth-child(2){animation-delay:0.1s} .summary-card:nth-child(3){animation-delay:0.15s} .summary-card:nth-child(4){animation-delay:0.2s}
.summary-label { font-size:0.7rem; font-weight:800; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.summary-value { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,var(--primary),#c77dff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; }
.summary-sub { font-size:0.72rem; font-weight:600; color:var(--muted); margin-top:5px; }

.section { margin-bottom:28px; }
.section-title { font-size:0.8rem; font-weight:800; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1.5px; background:linear-gradient(90deg,var(--border),transparent); border-radius:99px; }

.chart-container { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:20px 18px 14px; box-shadow:var(--shadow); }
.daily-chart { display:flex; align-items:flex-end; gap:3px; height:120px; }
.day-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:default; position:relative; }
.day-bar { width:100%; border-radius:6px 6px 0 0; min-height:2px; transition:opacity 0.2s; }
.day-bar:hover { opacity:0.75; }
.day-label { font-size:0.58rem; font-weight:700; color:var(--muted); }
.tip { position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:6px 10px; font-size:0.72rem; font-weight:700; white-space:nowrap; pointer-events:none; display:none; z-index:10; box-shadow:0 4px 16px rgba(180,120,200,0.15); }
.day-col:hover .tip { display:block; }

.weekly-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.week-card { background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 14px; box-shadow:var(--shadow); transition:border-color 0.2s, transform 0.2s; }
.week-card:hover { border-color:rgba(255,143,171,0.35); transform:translateY(-2px); }
.week-label { font-size:0.72rem; font-weight:800; color:var(--text-light); margin-bottom:3px; }
.week-date { font-size:0.65rem; font-weight:600; color:var(--muted); margin-bottom:7px; }
.week-value { font-size:1.5rem; font-weight:900; color:var(--primary); line-height:1; }
.week-sub { font-size:0.7rem; font-weight:600; color:var(--muted); margin-top:3px; }
.goal-bar-wrap { background:rgba(200,180,220,0.15); border-radius:99px; height:4px; margin-top:8px; overflow:hidden; }
.goal-bar { height:100%; border-radius:99px; transition:width 0.6s ease; }

/* Heatmap */
.heatmap-container { background:var(--surface); border:1.5px solid var(--border); border-radius:18px; padding:18px 16px 14px; box-shadow:var(--shadow); overflow-x:auto; }
.heatmap-grid { display:flex; gap:3px; }
.heatmap-week { display:flex; flex-direction:column; gap:3px; }
.heatmap-cell { width:13px; height:13px; border-radius:3px; cursor:default; transition:opacity 0.15s; }
.heatmap-cell:hover { opacity:0.75; }
.heatmap-month-labels { display:flex; gap:3px; margin-bottom:4px; font-size:0.65rem; font-weight:700; color:var(--muted); }
.heatmap-legend { display:flex; align-items:center; gap:5px; margin-top:10px; font-size:0.7rem; color:var(--muted); font-weight:600; }

@media (max-width:640px) { .summary-grid{grid-template-columns:repeat(2,1fr)} .weekly-grid{grid-template-columns:repeat(2,1fr)} }

/* Weekday pattern */
.weekday-chart { display:flex; align-items:flex-end; gap:8px; height:100px; padding-top:16px; }
.weekday-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; }
.weekday-bar { width:100%; border-radius:6px 6px 0 0; min-height:2px; }
.weekday-label { font-size:0.72rem; font-weight:800; color:var(--muted); }
.weekday-value { font-size:0.62rem; font-weight:700; color:var(--text-light); }
.weekday-insight { font-size:0.8rem; font-weight:700; color:var(--text-light); margin-top:10px; text-align:center; padding-top:8px; border-top:1.5px solid var(--border); }

/* Absence stats */
.absence-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.absence-stat { text-align:center; padding:12px 8px; }
.absence-stat-val { font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,#74b9ff,#a29bfe); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; margin-bottom:4px; }
.absence-stat-label { font-size:0.72rem; font-weight:700; color:var(--muted); }
</style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div>
<div class="header">
  <div class="logo">🌸 내 통계</div>
  <div class="header-right">
    <span class="username-tag" id="myName"></span>
    <a href="/dashboard" class="nav-btn">← 대시보드</a>
    <a href="/feedback" class="nav-btn">💬 피드백</a>
    <button class="nav-btn" onclick="logout()">로그아웃</button>
  </div>
</div>
<div class="container">
  <div class="egg-hero" id="eggHero">
    <div class="egg-hero-visual">
      <svg width="120" height="120" viewBox="0 0 120 120" style="position:absolute;top:0;left:0">
        <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="6"/>
        <circle cx="60" cy="60" r="50" fill="none" id="eggRingSvg" stroke="#ff8fab" stroke-width="6"
          stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round" transform="rotate(-90 60 60)"
          style="transition:stroke-dashoffset 1s ease"/>
      </svg>
      <div class="egg-big" id="eggBig"></div>
    </div>
    <div class="egg-hero-info">
      <div class="egg-hero-title" id="eggTitle">내 알 🥚</div>
      <div class="egg-hero-stage" id="eggStageLabel">알 단계</div>
      <div class="egg-progress-wrap">
        <div class="egg-progress-bar" id="eggProgressBar" style="width:0%"></div>
      </div>
      <div class="egg-progress-label" id="eggProgressLabel">0%</div>
      <div class="egg-next" id="eggNext"></div>
    </div>
  </div>

  <div class="period-selector">
    <button class="period-btn active" onclick="loadStats(30, this)">30일</button>
    <button class="period-btn" onclick="loadStats(60, this)">60일</button>
    <button class="period-btn" onclick="loadStats(90, this)">90일</button>
  </div>
  <div class="summary-grid">
    <div class="summary-card"><div class="summary-label">총 활동 시간</div><div class="summary-value" id="totalHours">–</div><div class="summary-sub" id="totalMinutes"></div></div>
    <div class="summary-card"><div class="summary-label">출석일</div><div class="summary-value" id="attendDays">–</div><div class="summary-sub" id="attendRate"></div></div>
    <div class="summary-card"><div class="summary-label">현재 연속</div><div class="summary-value" id="currentStreak">–</div><div class="summary-sub">일 연속</div></div>
    <div class="summary-card"><div class="summary-label">최대 연속</div><div class="summary-value" id="maxStreak">–</div><div class="summary-sub">일 최고 기록</div></div>
  </div>
  <div class="section">
    <div class="section-title">📅 일별 활동 — 최근 <span id="periodLabel">30</span>일</div>
    <div class="chart-container"><div class="daily-chart" id="dailyChart"></div></div>
  </div>
  <div class="section">
    <div class="section-title">📊 주간 요약 — 최근 4주</div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </div>
  <div class="section">
    <div class="section-title">🗓 활동 히트맵 — 최근 1년</div>
    <div class="heatmap-container" id="heatmapContainer">
      <div style="color:var(--muted);font-size:0.85rem;font-weight:600;text-align:center;padding:20px 0">로딩 중...</div>
    </div>
  </div>
  <div class="section" id="weekdaySection" style="display:none">
    <div class="section-title">📅 요일별 평균 패턴</div>
    <div class="chart-container">
      <div class="weekday-chart" id="weekdayChart"></div>
      <div class="weekday-insight" id="weekdayInsight"></div>
    </div>
  </div>
  <div class="section" id="absenceSection" style="display:none">
    <div class="section-title">🚶 외출 통계 — 최근 30일</div>
    <div class="chart-container">
      <div class="absence-grid" id="absenceGrid"></div>
    </div>
  </div>
</div>

    `<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="20,50 13,18 44,36" fill="#E8742C"/><polygon points="80,50 87,18 56,36" fill="#E8742C"/><polygon points="23,47 17,22 42,35" fill="#FFBBB0"/><polygon points="77,47 83,22 58,35" fill="#FFBBB0"/><circle cx="50" cy="57" r="34" fill="#E8742C"/><ellipse cx="50" cy="69" rx="22" ry="15" fill="#FFF5EE"/><circle cx="35" cy="50" r="12" fill="white"/><circle cx="65" cy="50" r="12" fill="white"/><circle cx="35" cy="51" r="8" fill="#3A1E08"/><circle cx="65" cy="51" r="8" fill="#3A1E08"/><circle cx="35" cy="51" r="5" fill="#1A0A00"/><circle cx="65" cy="51" r="5" fill="#1A0A00"/><circle cx="38" cy="48" r="2.5" fill="white"/><circle cx="68" cy="48" r="2.5" fill="white"/><ellipse cx="50" cy="64" rx="4.5" ry="3.5" fill="#1A1A1A"/><path d="M47,68 Q50,73 53,68" stroke="#C06030" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="25" cy="63" r="8" fill="rgba(255,130,80,0.25)"/><circle cx="75" cy="63" r="8" fill="rgba(255,130,80,0.25)"/></svg>`,
    // 6: 판다 (흑백, 눈 패치)
    `<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="25" cy="25" r="16" fill="#2A2A2A"/><circle cx="75" cy="25" r="16" fill="#2A2A2A"/><circle cx="50" cy="58" r="35" fill="#F8F8F5"/><ellipse cx="35" cy="51" rx="14" ry="12" fill="#2A2A2A" transform="rotate(-10 35 51)"/><ellipse cx="65" cy="51" rx="14" ry="12" fill="#2A2A2A" transform="rotate(10 65 51)"/><circle cx="35" cy="52" r="9" fill="white"/><circle cx="65" cy="52" r="9" fill="white"/><circle cx="35" cy="53" r="6" fill="#1A1A1A"/><circle cx="65" cy="53" r="6" fill="#1A1A1A"/><circle cx="38" cy="50" r="2.5" fill="white"/><circle cx="68" cy="50" r="2.5" fill="white"/><ellipse cx="50" cy="66" rx="5" ry="4" fill="#1A1A1A"/><path d="M46,70 Q50,75 54,70" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="27" cy="67" r="8" fill="rgba(255,160,180,0.25)"/><circle cx="73" cy="67" r="8" fill="rgba(255,160,180,0.25)"/></svg>`,
    // 7: 코알라 (회색, 큰 귀, 큰 코)
    `<svg width="100%" height="100%" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="36" r="22" fill="#A898B8"/><circle cx="84" cy="36" r="22" fill="#A898B8"/><circle cx="16" cy="36" r="14" fill="#C8BAD8"/><circle cx="84" cy="36" r="14" fill="#C8BAD8"/><circle cx="50" cy="60" r="32" fill="#B8AECA"/><circle cx="37" cy="54" r="11" fill="white"/><circle cx="63" cy="54" r="11" fill="white"/><circle cx="37" cy="55" r="7.5" fill="#2A2050"/><circle cx="63" cy="55" r="7.5" fill="#2A2050"/><circle cx="37" cy="55" r="4.5" fill="#110E28"/><circle cx="63" cy="55" r="4.5" fill="#110E28"/><circle cx="40" cy="52" r="2.5" fill="white"/><circle cx="66" cy="52" r="2.5" fill="white"/><ellipse cx="50" cy="67" rx="10" ry="8" fill="#5A4878"/><ellipse cx="47" cy="65" rx="3.5" ry="2.5" fill="rgba(255,255,255,0.25)"/><path d="M44,75 Q50,81 56,75" stroke="#7A6898" stroke-width="2" fill="none" stroke-linecap="round"/><circle cx="26" cy="65" r="8" fill="rgba(200,180,230,0.4)"/><circle cx="74" cy="65" r="8" fill="rgba(200,180,230,0.4)"/></svg>`
  ];

  function getEggStageSVG(stage, c) {
    const fc = 'rgba(50,30,40,0.58)';
    const bl = 'rgba(255,182,193,0.5)';
    if (stage === 0) return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="74" rx="36" ry="43" fill="${c.from}"/><ellipse cx="36" cy="52" rx="9" ry="13" fill="rgba(255,255,255,0.28)" transform="rotate(-18 36 52)"/><path d="M32,70 Q38,65 44,70" stroke="${fc}" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M56,70 Q62,65 68,70" stroke="${fc}" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M43,79 Q50,84 57,79" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="33" cy="76" r="7" fill="${bl}"/><circle cx="67" cy="76" r="7" fill="${bl}"/><text x="62" y="52" font-family="Arial" font-size="11" fill="${fc}" font-weight="bold">z</text><text x="70" y="40" font-family="Arial" font-size="14" fill="${fc}" font-weight="bold" opacity="0.65">z</text><text x="79" y="27" font-family="Arial" font-size="17" fill="${fc}" font-weight="bold" opacity="0.35">z</text></svg>`;
    if (stage === 1) return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="74" rx="36" ry="43" fill="${c.from}"/><ellipse cx="36" cy="52" rx="9" ry="13" fill="rgba(255,255,255,0.28)" transform="rotate(-18 36 52)"/><polyline points="50,31 46,43 54,50 48,60 53,68" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><line x1="54" y1="50" x2="61" y2="45" stroke="${fc}" stroke-width="2" stroke-linecap="round"/><circle cx="36" cy="70" r="10.5" fill="white"/><circle cx="36" cy="71" r="7" fill="#2A1A2A"/><circle cx="36" cy="71" r="4" fill="#111"/><circle cx="39" cy="68" r="2.5" fill="white"/><path d="M54,70 Q61,65 68,70" stroke="${fc}" stroke-width="3.5" fill="none" stroke-linecap="round"/><path d="M43,80 Q50,86 57,80" stroke="${fc}" stroke-width="2.5" fill="none" stroke-linecap="round"/><circle cx="28" cy="76" r="7" fill="${bl}"/><circle cx="67" cy="76" r="7" fill="${bl}"/></svg>`;
    return `<svg width="100%" height="100%" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg"><ellipse cx="50" cy="85" rx="36" ry="30" fill="${c.from}"/><path d="M14,62 Q22,50 34,55 Q41,42 50,50 Q59,42 66,55 Q78,50 86,62 Z" fill="${c.from}"/><path d="M14,62 Q22,50 34,55 Q41,42 50,50 Q59,42 66,55 Q78,50 86,62" stroke="${fc}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="67" r="11" fill="white"/><circle cx="64" cy="67" r="11" fill="white"/><circle cx="36" cy="68" r="7.5" fill="#2A1A2A"/><circle cx="64" cy="68" r="7.5" fill="#2A1A2A"/><circle cx="36" cy="68" r="4.5" fill="#111"/><circle cx="64" cy="68" r="4.5" fill="#111"/><circle cx="39" cy="65" r="2.5" fill="white"/><circle cx="67" cy="65" r="2.5" fill="white"/><path d="M38,80 Q50,90 62,80" stroke="${fc}" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="24" cy="75" r="7" fill="${bl}"/><circle cx="76" cy="75" r="7" fill="${bl}"/></svg>`;
  }

  const token = localStorage.getItem('token');
  if (!token) location.href = '/';
  const myUsername = localStorage.getItem('username');
  document.getElementById('myName').textContent = myUsername;
  function authH() { return { 'Authorization': 'Bearer ' + token }; }
  function logout() { localStorage.clear(); location.href = '/'; }
  function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function getEggType(username) {
    return Array.from(username).reduce((s,c)=>s+c.charCodeAt(0),0) % 8;
  }
  function getEggInfo(lifetime_minutes) {
    const h = lifetime_minutes;
    let stage, progress, nextMins;
    if (h >= THRESHOLDS[3]) { stage=3; progress=100; nextMins=0; }
    else if (h >= THRESHOLDS[2]) { stage=2; progress=(h-THRESHOLDS[2])/(THRESHOLDS[3]-THRESHOLDS[2])*100; nextMins=THRESHOLDS[3]-h; }
    else if (h >= THRESHOLDS[1]) { stage=1; progress=(h-THRESHOLDS[1])/(THRESHOLDS[2]-THRESHOLDS[1])*100; nextMins=THRESHOLDS[2]-h; }
    else { stage=0; progress=h/THRESHOLDS[1]*100; nextMins=THRESHOLDS[1]-h; }
    return { stage, progress: Math.min(progress,100), nextMins };
  }

  function updateEggHero(lifetime_minutes, animal_type_override) {
    const type = animal_type_override != null ? animal_type_override : getEggType(myUsername);
    const { stage, progress, nextMins } = getEggInfo(lifetime_minutes);
    const c = EGG_COLORS[type];
    const illust = stage === 3 ? ANIMAL_SVGS[type] : getEggStageSVG(stage, c);
    const eggEl = document.getElementById('eggBig');
    eggEl.innerHTML = '<div style="width:76px;height:76px">' + illust + '</div>';
    eggEl.style.background = stage === 3 ? 'linear-gradient(135deg,#f8f8ff,#fff)' : 'linear-gradient(135deg,' + c.bg + ',' + c.from + ')';
    if (stage===3) { eggEl.classList.add('hatched'); eggEl.classList.add('animal'); }
    document.getElementById('eggTitle').textContent = stage===3 ? ANIMAL_NAMES[type] + '!' : '내 알 🥚';
    document.getElementById('eggStageLabel').textContent = STAGE_LABELS[stage];
    const bar = document.getElementById('eggProgressBar');
    bar.style.width = progress + '%';
    bar.style.background = 'linear-gradient(90deg,' + c.ring + ',#c77dff)';
    document.getElementById('eggProgressLabel').textContent = Math.round(progress) + '% 진행';
    document.getElementById('eggRingSvg').style.stroke = c.ring;
    const circ = 2*Math.PI*50;
    document.getElementById('eggRingSvg').style.strokeDasharray = circ.toFixed(1);
    document.getElementById('eggRingSvg').style.strokeDashoffset = (circ*(1-progress/100)).toFixed(1);
    if (stage < 3 && nextMins > 0) {
      const h = Math.floor(nextMins/60), m = Math.round(nextMins%60);
      document.getElementById('eggNext').textContent = '다음 단계까지 ' + (h>0?h+'시간 ':'') + m + '분 더 공부하면!';
    } else if (stage===3) {
      document.getElementById('eggNext').textContent = '완전히 부화했어요! 🎊';
    }
  }

  async function loadStats(days, btn) {
    try {
    if (btn) { document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('active');}); btn.classList.add('active'); }
    document.getElementById('periodLabel').textContent = days;
    const res = await fetch('/api/my-stats?days=' + days, { headers: authH() });
    if (res.status === 401) { localStorage.clear(); location.href = '/'; return; }
    const d = await res.json();
    const totalMins = d.total_minutes;
    document.getElementById('totalHours').textContent = Math.floor(totalMins/60) + 'h ' + Math.round(totalMins%60) + 'm';
    document.getElementById('totalMinutes').textContent = totalMins + '분 총합';
    document.getElementById('attendDays').textContent = d.attend_days + '일';
    document.getElementById('attendRate').textContent = '전체 ' + days + '일 중 ' + Math.round(d.attend_days/days*100) + '%';
    document.getElementById('currentStreak').textContent = d.current_streak;
    document.getElementById('maxStreak').textContent = d.max_streak;

    // 평생 누적은 /api/stats에서 가져오기 (별도 요청)
    const statsRes = await fetch('/api/stats?period=daily', { headers: authH() });
    if (statsRes.ok) {
      const statsData = await statsRes.json();
      const myEntry = statsData.find(function(u){return u.username===myUsername;});
      updateEggHero(myEntry ? (myEntry.lifetime_minutes || 0) : 0, myEntry ? myEntry.animal_type : null);
    }

    const chart = document.getElementById('dailyChart');
    const maxSecs = Math.max.apply(null, d.daily.map(function(x){return x.active_seconds;}).concat([1]));
    const goal = d.daily_goal_minutes * 60;
    chart.innerHTML = d.daily.map(function(item) {
      const pct = Math.max(item.active_seconds/maxSecs*100, item.active_seconds>0?4:0);
      const gp = Math.min(item.active_seconds/goal*100,100);
      const color = gp>=100?'linear-gradient(180deg,#6bcb77,#3a9b44)':gp>=50?'linear-gradient(180deg,#ff8fab,#c77dff)':item.active_seconds>0?'linear-gradient(180deg,#ddd0ee,#c4b5d5)':'#f0eaf8';
      return '<div class="day-col"><div class="tip">' + esc(item.date) + '\n' + esc(String(item.active_minutes)) + '분 · 목표 ' + Math.round(gp) + '%</div>'
        + '<div class="day-bar" style="height:' + pct + '%;background:' + color + '"></div>'
        + '<div class="day-label">' + esc(item.date.slice(8)) + '</div></div>';
    }).join('');

    const weekGrid = document.getElementById('weeklyGrid');
    weekGrid.innerHTML = d.weekly.map(function(w, i) {
      const label = i===0?'이번 주':i+'주 전';
      const gw = d.daily_goal_minutes*7;
      const rate = Math.min(Math.round(w.active_minutes/gw*100),100);
      const color = rate>=100?'#6bcb77':rate>=50?'#ff8fab':'#ddd0ee';
      return '<div class="week-card"><div class="week-label">' + label + '</div>'
        + '<div class="week-date">' + w.start.slice(5) + ' ~ ' + w.end.slice(5) + '</div>'
        + '<div class="week-value">' + Math.floor(w.active_minutes/60) + 'h</div>'
        + '<div class="week-sub">' + w.active_minutes + '분 · 목표 ' + rate + '%</div>'
        + '<div class="goal-bar-wrap"><div class="goal-bar" style="width:' + rate + '%;background:' + color + '"></div></div></div>';
    }).join('');
    } catch { /* 네트워크 오류 시 무시 */ }
  }

  async function loadHeatmap() {
    try {
      const res = await fetch('/api/my-stats?days=365', { headers: authH() });
      if (!res.ok) return;
      const d = await res.json();
      const goal = d.daily_goal_minutes * 60;
      const daily = d.daily; // 365 items, oldest first

      // daily를 날짜 맵으로 변환
      const dayMap = {};
      daily.forEach(function(item) { dayMap[item.date] = item.active_seconds; });

      // 오늘 기준으로 53주 x 7일 그리드 구성 (GitHub 스타일)
      const today = new Date();
      // 그리드는 오늘이 속한 주의 토요일부터 거꾸로 53주
      const todayDay = today.getDay(); // 0=일, 6=토
      // 그리드 시작일: 오늘로부터 (53*7 - (6 - todayDay) - 1)일 전의 일요일
      const gridEnd = new Date(today);
      gridEnd.setDate(gridEnd.getDate() + (6 - todayDay)); // 이번주 토요일
      const gridStart = new Date(gridEnd);
      gridStart.setDate(gridEnd.getDate() - 53*7 + 1);

      const weeks = [];
      let cur = new Date(gridStart);
      const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const monthPositions = [];
      let weekIdx = 0;
      while (cur <= gridEnd) {
        const week = [];
        for (let i = 0; i < 7; i++) {
          const iso = cur.toISOString().split('T')[0];
          const secs = dayMap[iso] || 0;
          const isFuture = cur > today;
          week.push({ date: iso, secs, isFuture, day: i, month: cur.getMonth() });
          if (i === 0 && (weekIdx === 0 || cur.getDate() <= 7)) {
            monthPositions.push({ weekIdx, month: cur.getMonth() });
          }
          cur.setDate(cur.getDate() + 1);
        }
        weeks.push(week);
        weekIdx++;
      }

      function cellColor(secs, isFuture) {
        if (isFuture) return '#f0eaf8';
        if (secs === 0) return 'rgba(200,180,220,0.2)';
        const ratio = Math.min(secs / goal, 1);
        if (ratio >= 1) return '#6bcb77';
        if (ratio >= 0.6) return '#ff8fab';
        if (ratio >= 0.3) return '#ffd166';
        return '#ddd0ee';
      }

      // 월 라벨
      const monthLabelHtml = weeks.map(function(week, wi) {
        const first = week[0];
        const show = wi === 0 || (first.day === 0 && first.date.slice(8) <= '07');
        return '<div style="min-width:16px;font-size:0.62rem;font-weight:700;color:var(--muted)">' + (show ? MONTH_NAMES[first.month] : '') + '</div>';
      }).join('');

      const gridHtml = weeks.map(function(week) {
        const cells = week.map(function(cell) {
          const mins = Math.round(cell.secs / 60);
          const title = cell.date + ': ' + mins + '분';
          return '<div class="heatmap-cell" style="background:' + cellColor(cell.secs, cell.isFuture) + '" title="' + esc(title) + '"></div>';
        }).join('');
        return '<div class="heatmap-week">' + cells + '</div>';
      }).join('');

      document.getElementById('heatmapContainer').innerHTML =
        '<div class="heatmap-month-labels" style="display:flex;gap:3px;margin-bottom:4px">' + monthLabelHtml + '</div>' +
        '<div class="heatmap-grid">' + gridHtml + '</div>' +
        '<div class="heatmap-legend"><span>적음</span>' +
        ['rgba(200,180,220,0.2)','#ddd0ee','#ffd166','#ff8fab','#6bcb77'].map(function(c){
          return '<div class="heatmap-cell" style="background:' + c + '"></div>';
        }).join('') +
        '<span>많음</span></div>';

      // 요일별 평균 패턴 (365일 데이터 재활용)
      const DAY_ORDER = [1, 2, 3, 4, 5, 6, 0]; // 월~일
      const DAY_NAMES = ['월', '화', '수', '목', '금', '토', '일'];
      const dayTotals = new Array(7).fill(0);
      const dayCounts = new Array(7).fill(0);
      daily.forEach(function(item) {
        const dow = new Date(item.date).getUTCDay(); // 0=Sun...6=Sat
        dayTotals[dow] += item.active_seconds;
        dayCounts[dow]++;
      });
      const dayAvgs = DAY_ORDER.map(function(dow) {
        return dayCounts[dow] > 0 ? Math.round(dayTotals[dow] / dayCounts[dow] / 60) : 0;
      });
      const maxAvg = Math.max.apply(null, dayAvgs.concat([1]));
      const bestIdx = dayAvgs.reduce(function(best, val, i) { return val > dayAvgs[best] ? i : best; }, 0);
      const wdSection = document.getElementById('weekdaySection');
      if (wdSection) {
        wdSection.style.display = '';
        document.getElementById('weekdayChart').innerHTML = dayAvgs.map(function(avg, i) {
          const pct = Math.max(avg / maxAvg * 100, avg > 0 ? 5 : 0);
          const color = avg >= d.daily_goal_minutes ? 'linear-gradient(180deg,#6bcb77,#3a9b44)' : avg > 0 ? 'linear-gradient(180deg,#ff8fab,#c77dff)' : '#f0eaf8';
          return '<div class="weekday-col"><div class="weekday-value">' + (avg > 0 ? avg + '분' : '-') + '</div>'
            + '<div class="weekday-bar" style="height:' + pct + '%;background:' + color + '"></div>'
            + '<div class="weekday-label">' + DAY_NAMES[i] + '</div></div>';
        }).join('');
        document.getElementById('weekdayInsight').textContent = dayAvgs[bestIdx] > 0
          ? DAY_NAMES[bestIdx] + '요일에 평균 ' + dayAvgs[bestIdx] + '분으로 가장 많이 공부해요!'
          : '아직 데이터가 부족해요';
      }
    } catch { /* 히트맵 로드 실패 시 무시 */ }
  }

  async function loadAbsenceStats() {
    try {
      const res = await fetch('/api/my-absence-stats?days=30', { headers: authH() });
      if (!res.ok) return;
      const d = await res.json();
      const section = document.getElementById('absenceSection');
      if (!section) return;
      section.style.display = '';
      const h = Math.floor(d.total_absence_minutes / 60);
      const m = Math.round(d.total_absence_minutes % 60);
      document.getElementById('absenceGrid').innerHTML =
        '<div class="absence-stat"><div class="absence-stat-val">' + d.total_absence_count + '회</div><div class="absence-stat-label">총 외출 횟수</div></div>' +
        '<div class="absence-stat"><div class="absence-stat-val">' + (h > 0 ? h + 'h ' : '') + m + 'm</div><div class="absence-stat-label">총 외출 시간</div></div>' +
        '<div class="absence-stat"><div class="absence-stat-val">' + d.avg_per_outing + '분</div><div class="absence-stat-label">외출당 평균</div></div>';
    } catch {}
  }

  loadStats(30);
  loadHeatmap();
  loadAbsenceStats();
</script>
